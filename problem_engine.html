<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Problem Engine</title>
<style>
  :root{
    --ink:#11141a; --paper:#f7f5f0; --card:#ffffff; --line:#e4e0d6;
    --muted:#6b7280; --accent:#c2410c; --accent-soft:#fdebe0;
    --easy:#2f7d4f; --medium:#b07d12; --hard:#b23b3b;
    --done:#2f7d4f; --shadow:0 1px 2px rgba(17,20,26,.06),0 8px 24px rgba(17,20,26,.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'SF Mono',ui-monospace,'Cascadia Code',Menlo,Consolas,monospace;
    background:var(--paper); color:var(--ink); min-height:100vh;
    display:flex; align-items:flex-start; justify-content:center; padding:32px 18px 64px;
  }
  .wrap{width:100%; max-width:560px}
  .top{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:22px}
  .title{font-size:15px; font-weight:700; letter-spacing:.04em}
  .title b{color:var(--accent)}
  .count{font-size:12px; color:var(--muted)}

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    box-shadow:var(--shadow); padding:26px 24px; margin-bottom:16px;
  }
  .eyebrow{display:flex; gap:8px; align-items:center; font-size:11px;
    color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-bottom:14px}
  .eyebrow .dot{width:5px;height:5px;border-radius:50%;background:var(--accent)}
  .vname{color:var(--ink); font-weight:700}

  .pname{font-size:23px; line-height:1.25; font-weight:700; letter-spacing:-.01em; margin-bottom:14px}
  .meta{display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:22px}
  .pill{font-size:11px; padding:4px 9px; border-radius:999px; border:1px solid var(--line);
    letter-spacing:.04em; text-transform:uppercase}
  .pill.easy{color:var(--easy); border-color:#bfe3cd; background:#eef8f1}
  .pill.medium{color:var(--medium); border-color:#e8d9b0; background:#fbf3df}
  .pill.hard{color:var(--hard); border-color:#ecc9c9; background:#fbeeee}
  .pill.tier{color:var(--muted)}

  .actions{display:flex; gap:10px; flex-wrap:wrap}
  a.btn,button.btn{
    font:inherit; font-size:13px; font-weight:600; letter-spacing:.02em;
    border-radius:10px; padding:11px 16px; cursor:pointer; border:1px solid var(--line);
    background:var(--card); color:var(--ink); text-decoration:none; display:inline-flex;
    align-items:center; gap:7px; transition:transform .04s ease, background .15s ease, border-color .15s ease;
  }
  a.btn:active,button.btn:active{transform:translateY(1px)}
  .btn.solve{background:var(--ink); color:#fff; border-color:var(--ink)}
  .btn.done{background:var(--accent); color:#fff; border-color:var(--accent)}
  .btn.ghost{color:var(--muted)}
  .btn:disabled{opacity:.5; cursor:not-allowed}

  .coldrow{display:flex; align-items:center; gap:9px; margin-top:18px;
    font-size:12px; color:var(--muted)}
  .coldrow input{accent-color:var(--accent); width:15px; height:15px}

  .vbar{margin-top:18px}
  .vbar .track{height:6px; background:#efece4; border-radius:999px; overflow:hidden}
  .vbar .fill{height:100%; background:var(--accent); border-radius:999px; transition:width .3s ease}
  .vbar .lbl{display:flex; justify-content:space-between; font-size:11px; color:var(--muted); margin-top:7px}

  .sub{display:flex; gap:10px; align-items:center; justify-content:space-between; margin-top:4px}
  .more{font-size:12px; color:var(--accent); background:none; border:none; cursor:pointer; padding:6px 0}
  .more:hover{text-decoration:underline}

  .gate{background:var(--card); border:1px solid var(--line); border-radius:14px;
    box-shadow:var(--shadow); padding:20px 22px; margin-bottom:16px}
  .gate label{font-size:11px; color:var(--muted); letter-spacing:.05em; text-transform:uppercase}
  .gate-row{display:flex; gap:10px; margin-top:9px}
  .gate input{flex:1; font:inherit; font-size:13px; padding:9px 12px; border:1px solid var(--line);
    border-radius:9px; background:var(--paper)}
  .gate .state{font-size:11px; margin-top:8px; color:var(--muted)}
  .gate .state.ok{color:var(--done)}

  .overflow{margin-top:14px; border-top:1px dashed var(--line); padding-top:14px; display:none}
  .overflow.show{display:block}
  .overflow h4{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:10px}
  .ov-item{display:flex; justify-content:space-between; align-items:center; padding:7px 0; font-size:13px; border-bottom:1px solid #f1eee7}
  .ov-item a{color:var(--ink); text-decoration:none}
  .ov-item a:hover{color:var(--accent)}

  .msg{font-size:13px; color:var(--muted); text-align:center; padding:30px 0}
  .done-state{text-align:center; padding:34px 10px}
  .done-state .big{font-size:30px; margin-bottom:8px}
  .foot{text-align:center; font-size:11px; color:var(--muted); margin-top:24px; line-height:1.6}
  .target-edit{font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer}
  .target-edit:hover{text-decoration:underline}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="title">PROBLEM&nbsp;<b>ENGINE</b></div>
    <div class="count" id="count">—</div>
  </div>

  <!-- admin gate: paste key to unlock write actions -->
  <div class="gate" id="gate">
    <label for="key">Admin key — unlock to mark progress</label>
    <div class="gate-row">
      <input id="key" type="password" placeholder="enter key" autocomplete="off">
      <button class="btn done" onclick="unlock()">Unlock</button>
    </div>
    <div class="state" id="gateState">Read-only. Visitors can view the queue but not change it.</div>
  </div>

  <div id="main"><div class="msg">Loading your next problem…</div></div>

  <div class="foot">
    Auto-picks the next problem: current topic → current variation → easiest unsolved.<br>
    Marking done is recorded in the sheet. Solved problems also go in your SRS log as usual.
  </div>
</div>

<script>
/* ====== CONFIG: paste your Apps Script /exec URL here ====== */
const API = 'https://script.google.com/macros/s/AKfycbxBL-fDlOwouLJnujm1_v4lbDfyRjMACdhAbV_KtYUyAJnQYK_qnwsoHC5NBqwztMx4Bw/exec';

let ADMIN_KEY = '';            // set on unlock
let COLD_GATE = true;          // require cold-test checkbox before advancing a variation
let current = null;            // current problem payload

function unlock(){
  const k = document.getElementById('key').value.trim();
  if(!k){ return; }
  ADMIN_KEY = k;
  document.getElementById('gate').style.display='none';
  render(); // re-render so buttons enable
}

async function call(action, params={}){
  const u = new URL(API);
  u.searchParams.set('action', action);
  Object.keys(params).forEach(k=>u.searchParams.set(k, params[k]));
  const res = await fetch(u.toString());
  return res.json();
}

async function load(){
  try{
    const data = await call('getNext');
    current = data;
    render();
    refreshCount();
  }catch(e){
    document.getElementById('main').innerHTML =
      '<div class="card"><div class="msg">Could not reach the engine. Check the API URL.</div></div>';
  }
}

async function refreshCount(){
  try{
    const p = await call('getProgress');
    if(p && p.ok){
      document.getElementById('count').textContent =
        p.totalDone + ' / ' + p.totalProblems + ' done';
    }
  }catch(e){}
}

function diffClass(d){ return (d||'').toLowerCase(); }

function render(){
  const main = document.getElementById('main');
  if(!current){ return; }

  if(current.done){
    main.innerHTML =
      '<div class="card"><div class="done-state"><div class="big">✓</div>'+
      '<div>'+ (current.message||'All targets met.') +'</div></div></div>';
    return;
  }

  const p = current.problem, v = current.variation;
  const locked = !ADMIN_KEY;
  const pct = Math.round((v.done / Math.max(v.target,1))*100);

  main.innerHTML = `
    <div class="card">
      <div class="eyebrow">
        <span class="dot"></span>
        <span>${p.category}</span>
      </div>
      <div class="eyebrow" style="margin-top:-6px">
        <span class="vname">${v.name}</span>
        <button class="target-edit" onclick="editTarget('${esc(v.category)}','${esc(v.name)}',${v.target})">target ${v.target} ✎</button>
      </div>

      <div class="pname">${p.name}</div>
      <div class="meta">
        <span class="pill ${diffClass(p.difficulty)}">${p.difficulty||'—'}</span>
        ${p.tier && p.tier!=='Extended' ? '<span class="pill tier">'+p.tier+'</span>' : ''}
      </div>

      <div class="actions">
        <a class="btn solve" href="${p.url||'#'}" target="_blank" rel="noopener">Open on LeetCode ↗</a>
        <button class="btn done" id="doneBtn" ${locked?'disabled title="Unlock to mark progress"':''}
          onclick="markDone()">Mark done</button>
        <button class="btn ghost" onclick="toggleOverflow()">+ more of this variation</button>
      </div>

      <div class="coldrow">
        <input type="checkbox" id="cold" ${locked?'disabled':''}>
        <label for="cold">Cold-test passed (solved a fresh one without hints)</label>
      </div>

      <div class="vbar">
        <div class="track"><div class="fill" style="width:${Math.min(pct,100)}%"></div></div>
        <div class="lbl"><span>${v.done} of ${v.target} in this variation</span><span>${v.total} available</span></div>
      </div>

      <div class="overflow" id="overflow"><h4>More in “${v.name}”</h4><div id="ovlist"></div></div>
    </div>`;
}

function esc(s){ return String(s).replace(/'/g,"\\'"); }

async function markDone(){
  if(!ADMIN_KEY || !current || !current.problem) return;
  const btn = document.getElementById('doneBtn');
  btn.disabled = true; btn.textContent = 'Saving…';
  const cold = document.getElementById('cold');
  const params = { key:ADMIN_KEY, row: current.problem.row };
  if(cold && cold.checked) params.coldTest = 'pass';
  try{
    const data = await call('markDone', params);
    current = data;
    render();
    refreshCount();
  }catch(e){
    btn.disabled=false; btn.textContent='Mark done';
  }
}

async function editTarget(category, variation, cur){
  if(!ADMIN_KEY){ alert('Unlock with the admin key first.'); return; }
  const n = prompt('Problems to do in “'+variation+'” before moving on:', cur);
  if(n===null) return;
  const num = parseInt(n,10);
  if(!num || num<1) return;
  await call('setTarget', {key:ADMIN_KEY, category, variation, target:num});
  load();
}

async function toggleOverflow(){
  const box = document.getElementById('overflow');
  if(box.classList.contains('show')){ box.classList.remove('show'); return; }
  if(!current || !current.variation) return;
  const v = current.variation;
  const data = await call('moreOfVariation', {category:v.category, variation:v.name});
  const list = document.getElementById('ovlist');
  if(data && data.items && data.items.length){
    list.innerHTML = data.items.map(it =>
      `<div class="ov-item"><a href="${it.url||'#'}" target="_blank" rel="noopener">${it.name}</a>`+
      `<span class="pill ${diffClass(it.difficulty)}">${it.difficulty}</span></div>`).join('');
  } else {
    list.innerHTML = '<div class="msg" style="padding:10px 0">Nothing left here.</div>';
  }
  box.classList.add('show');
}

load();
</script>
</body>
</html>
