<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRS Engine | Ananth</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root{--bg:#030303;--bg2:#0a0a0a;--bg3:#111;--card:#0d0d0d;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);--text:#f4f4f5;--muted:#71717a;--dim:#3f3f46;--green:#39d353;--blue:#3b82f6;--yellow:#eab308;--red:#ef4444;--purple:#a855f7;--fd:'Space Grotesk',sans-serif;--fm:'IBM Plex Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--fd);min-height:100vh;padding:40px 20px;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at 50% 0%,black 30%,transparent 80%);pointer-events:none;z-index:0}
.wrap{max-width:820px;margin:0 auto;position:relative;z-index:1}
/* HEADER */
.hdr{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--border);padding-bottom:20px;margin-bottom:28px;flex-wrap:wrap;gap:14px}
.hdr-left{display:flex;align-items:center;gap:12px}
.sys-dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2s ease infinite;flex-shrink:0}
h1{font-size:1.7rem;font-weight:700;letter-spacing:-.5px}
.sub{font-family:var(--fm);font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:3px}
.hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.date-chip{font-family:var(--fm);font-size:.72rem;color:var(--muted);background:var(--bg2);border:1px solid var(--border);padding:6px 14px;border-radius:20px}
/* QUEUE INFO BAR */
.queue-info{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.qi-label{font-family:var(--fm);font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;flex-shrink:0}
.qi-blocks{display:flex;gap:8px;flex-wrap:wrap}
.qi-chip{font-family:var(--fm);font-size:.63rem;padding:3px 10px;border-radius:5px;display:flex;align-items:center;gap:5px;white-space:nowrap}
.qi-ret{background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.qi-fresh{background:rgba(57,211,83,.1);color:var(--green);border:1px solid rgba(57,211,83,.2)}
.qi-total{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
/* PROPORTION BAR */
.proportion-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.prop-label{font-family:var(--fm);font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;flex-shrink:0}
.prop-segments{display:flex;gap:3px;flex:1;min-width:160px;height:6px;border-radius:3px;overflow:hidden}
.prop-seg{height:100%;border-radius:3px;transition:width .6s ease}
.prop-chips{display:flex;gap:10px;flex-wrap:wrap}
.prop-chip{font-family:var(--fm);font-size:.65rem;padding:3px 9px;border-radius:4px;display:flex;align-items:center;gap:5px;white-space:nowrap}
.pc-struggled{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.pc-smooth{background:rgba(57,211,83,.1);color:var(--green);border:1px solid rgba(57,211,83,.2)}
.pc-new{background:rgba(168,85,247,.1);color:var(--purple);border:1px solid rgba(168,85,247,.2)}
.pc-total{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-label{font-family:var(--fm);font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}
.filter-btn{font-family:var(--fm);font-size:.65rem;padding:5px 11px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--muted);cursor:pointer;transition:.18s;white-space:nowrap}
.filter-btn:hover{color:var(--text);border-color:var(--border2)}
.filter-btn.active{border-color:var(--green);color:var(--green);background:rgba(57,211,83,.07)}
.filter-sep{width:1px;height:18px;background:var(--border);flex-shrink:0}
/* BLOCK DIVIDER */
.block-divider{display:flex;align-items:center;gap:12px;margin:20px 0 12px}
.block-label{font-family:var(--fm);font-size:.6rem;text-transform:uppercase;letter-spacing:2px;padding:3px 10px;border-radius:4px;white-space:nowrap}
.bl-retention{color:var(--blue);background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2)}
.bl-fresh{color:var(--green);background:rgba(57,211,83,.1);border:1px solid rgba(57,211,83,.2)}
.block-line{flex:1;height:1px;background:var(--border)}
/* CARDS */
.problem-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:14px;transition:border-color .2s;position:relative;overflow:hidden}
.problem-card:hover{border-color:var(--border2)}
.problem-card.card-struggled{border-left:3px solid var(--red)}
.problem-card.card-smooth{border-left:3px solid var(--green)}
.problem-card.card-new{border-left:3px solid var(--purple)}
.problem-card.card-fresh{border-left:3px solid var(--orange);background:rgba(249,115,22,.02)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.card-title{font-size:1.1rem;font-weight:600;color:var(--text);line-height:1.3;flex:1}
.pattern-tag{font-family:var(--fm);font-size:.65rem;padding:4px 10px;border-radius:5px;background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2);white-space:nowrap;flex-shrink:0}
.meta-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.badge{font-family:var(--fm);padding:3px 8px;border-radius:4px;font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.b-topic{background:rgba(255,255,255,.07);color:#d4d4d8;border:1px solid var(--border)}
.b-phase-struggled{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.b-phase-smooth{background:rgba(57,211,83,.08);color:var(--green);border:1px solid rgba(57,211,83,.18)}
.b-phase-new{background:rgba(168,85,247,.1);color:var(--purple);border:1px solid rgba(168,85,247,.2)}
.b-phase-mastered{background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.3)}
.b-attempt{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
.b-date{background:rgba(59,130,246,.08);color:#60a5fa;border:1px solid rgba(59,130,246,.15)}
.b-ef{background:rgba(234,179,8,.08);color:var(--yellow);border:1px solid rgba(234,179,8,.15)}
.b-fresh{background:rgba(249,115,22,.1);color:var(--orange);border:1px solid rgba(249,115,22,.2)}
/* ACTION BUTTONS */
.actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
button{font-family:var(--fd);font-weight:600;font-size:.82rem;padding:9px 16px;border-radius:8px;border:none;cursor:pointer;transition:.18s}
.btn-hint{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-hint:hover{color:var(--text);border-color:var(--border2)}
.btn-timer{background:rgba(59,130,246,.15);color:var(--blue);border:1px solid rgba(59,130,246,.3)}
.btn-timer:hover{background:rgba(59,130,246,.25)}
.timer-display{font-family:var(--fm);font-size:1rem;font-weight:600;display:none;width:55px;text-align:center;color:var(--yellow)}
.timer-danger{color:var(--red);animation:pulse 1s infinite}
.btn-struggled{background:transparent;color:var(--red);border:1px dashed rgba(239,68,68,.5);margin-left:auto;font-size:.78rem}
.btn-struggled:hover{background:rgba(239,68,68,.08);border-color:var(--red)}
.btn-smooth{background:var(--green);color:#000;border:1px solid var(--green);font-size:.78rem}
.btn-smooth:hover{opacity:.85;box-shadow:0 0 16px rgba(57,211,83,.3)}
.btn-refresh{background:transparent;color:var(--muted);border:1px solid var(--border);font-size:.72rem}
.split-toggle{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:3px}
.split-opt{font-family:var(--fm);font-size:.66rem;padding:5px 10px;border-radius:6px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:.15s;white-space:nowrap}
.split-opt:hover{color:var(--text)}
.split-opt.active{background:rgba(168,85,247,.15);color:#c084fc;font-weight:600}
.drain-meter{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:16px}
.drain-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;flex-wrap:wrap;gap:6px}
.drain-label{font-family:var(--fm);font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}
.drain-nums{font-family:var(--fm);font-size:.72rem;color:var(--text)}
.drain-bar{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.drain-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),#22c55e);transition:width .8s ease}
.btn-complete{background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.35);font-size:.78rem;padding:7px 13px}
.btn-complete:hover{background:rgba(168,85,247,.2);box-shadow:0 0 14px rgba(168,85,247,.25)}
.btn-refresh:hover{color:var(--text);border-color:var(--border2)}
.btn-add{background:transparent;color:var(--green);border:1px solid rgba(57,211,83,.4)}
.btn-add:hover{background:rgba(57,211,83,.08)}
button:disabled{opacity:.4;pointer-events:none}
/* TRIGGER / MOVE BLOCK */
.tm-block{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.tm-cell{flex:1;min-width:200px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px;padding:11px 14px}
.tm-cell.tm-trigger{border-left:3px solid var(--orange)}
.tm-cell.tm-move{border-left:3px solid var(--green)}
.tm-label{font-family:var(--fm);font-size:.56rem;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.tm-trigger .tm-label{color:var(--orange)}
.tm-move .tm-label{color:var(--green)}
.tm-text{font-size:.82rem;color:#d4d4d8;line-height:1.5}
.tm-empty{color:var(--dim);font-style:italic;font-size:.76rem}
.tm-reveal{cursor:pointer;filter:blur(5px);transition:filter .2s;user-select:none}
.tm-reveal.shown{filter:none}
/* TM EDIT */
.btn-tm-edit{background:transparent;color:var(--orange);border:1px dashed rgba(249,115,22,.4);font-size:.72rem;padding:6px 12px}
.btn-tm-edit:hover{background:rgba(249,115,22,.08);border-color:var(--orange)}
.tm-editor{display:none;margin-top:12px;background:rgba(249,115,22,.03);border:1px solid rgba(249,115,22,.2);border-radius:10px;padding:14px}
.tm-editor.open{display:block}
.tm-field{margin-bottom:10px}
.tm-field label{display:block;font-family:var(--fm);font-size:.56rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px}
.tm-field input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:7px;font-family:var(--fd);font-size:.82rem;outline:none;transition:.2s}
.tm-field input:focus{border-color:var(--orange)}
.tm-edit-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
.btn-tm-save{background:var(--orange);color:#000;border:none;font-size:.74rem;padding:7px 15px}
.btn-tm-save:hover{opacity:.85}
.btn-tm-cancel{background:transparent;color:var(--muted);border:1px solid var(--border);font-size:.74rem;padding:7px 13px}
.hint-box{display:none;background:rgba(59,130,246,.05);padding:14px 16px;border-radius:8px;margin-top:16px;font-size:.88rem;color:#cbd5e1;border-left:3px solid var(--blue);line-height:1.65;border:1px solid rgba(59,130,246,.15);border-left-width:3px}
/* SM-2 PREVIEW */
.sm2-preview{display:flex;gap:8px;margin-top:10px;padding:10px 12px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;align-items:center;flex-wrap:wrap}
.sm2-label{font-family:var(--fm);font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;flex-shrink:0}
.sm2-smooth{font-family:var(--fm);font-size:.7rem;color:var(--green);background:rgba(57,211,83,.08);padding:3px 9px;border-radius:4px;border:1px solid rgba(57,211,83,.2)}
.sm2-struggled{font-family:var(--fm);font-size:.7rem;color:var(--red);background:rgba(239,68,68,.06);padding:3px 9px;border-radius:4px;border:1px solid rgba(239,68,68,.15)}
/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;background:var(--card);border-radius:16px;border:1px dashed var(--border2)}
.empty-state h2{color:var(--green);margin-bottom:8px}
.empty-state p{color:var(--muted);font-family:var(--fm);font-size:.78rem}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border2);width:90%;max-width:500px;border-radius:16px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.modal h2{font-size:1.2rem;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-family:var(--fm);font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.form-control{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-family:var(--fd);font-size:.85rem;outline:none;transition:.2s}
.form-control:focus{border-color:var(--green)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.btn-cancel{background:transparent;border:1px solid var(--border2);color:var(--muted)}
.btn-cancel:hover{color:var(--text)}
.btn-save{background:var(--green);color:#000}
.btn-save:hover{opacity:.85}
.nav-link{font-family:var(--fm);font-size:.7rem;color:var(--muted);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:6px;transition:.18s}
.nav-link:hover{color:var(--text);border-color:var(--border2)}
@keyframes pulse{50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade{animation:fadeIn .3s ease}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-left">
      <div class="sys-dot"></div>
      <div>
        <h1>SRS Engine</h1>
        <div class="sub" id="split-sub">SM-2 Adaptive · 5 Retention + 3 Fresh daily</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="split-toggle" id="split-toggle">
        <button class="split-opt" data-split="7,1" onclick="setSplit(7,1,this)">Drain 7+1</button>
        <button class="split-opt" data-split="6,2" onclick="setSplit(6,2,this)">Lean 6+2</button>
        <button class="split-opt" data-split="5,3" onclick="setSplit(5,3,this)">Balanced 5+3</button>
      </div>
      <button class="btn-refresh" onclick="refreshQueue()">↺ New Queue</button>
      <button class="btn-add" onclick="openModal()">+ Log Problem</button>
      <div class="date-chip" id="date-display"></div>
      <a href="dashboard.html" class="nav-link">← Hub</a>
    </div>
  </div>
  <!-- QUEUE INFO BAR -->
  <div class="queue-info" id="queue-info" style="display:none">
    <div class="qi-label">Today's Mix</div>
    <div class="qi-blocks" id="qi-blocks"></div>
  </div>
  <!-- DRAIN PROGRESS METER -->
  <div class="drain-meter" id="drain-meter" style="display:none">
    <div class="drain-top">
      <span class="drain-label">📉 First-Review Progress</span>
      <span class="drain-nums" id="drain-nums">—</span>
    </div>
    <div class="drain-bar"><div class="drain-fill" id="drain-fill" style="width:0%"></div></div>
  </div>
  <!-- PROPORTION BAR -->
  <div class="proportion-bar" id="proportion-bar" style="display:none">
    <div class="prop-label">Due Pool</div>
    <div class="prop-segments" id="prop-segs"></div>
    <div class="prop-chips" id="prop-chips"></div>
  </div>
  <!-- FILTER BAR -->
  <div class="filter-bar">
    <span class="filter-label">Filter</span>
    <button class="filter-btn active" onclick="setFilter('all',this)">All Due</button>
    <button class="filter-btn" onclick="setFilter('Struggled',this)">⚠ Struggled</button>
    <button class="filter-btn" onclick="setFilter('Smooth',this)">✓ In Review</button>
    <button class="filter-btn" onclick="setFilter('New',this)">★ New/Fresh</button>
    <div class="filter-sep"></div>
    <span class="filter-label">Topic</span>
    <div id="topic-filters" style="display:flex;gap:6px;flex-wrap:wrap"></div>
  </div>
  <div id="loading" class="empty-state"><h2 style="color:var(--muted);animation:pulse 1.5s infinite">Syncing…</h2></div>
  <div id="queue"></div>
</div>
<!-- ADD PROBLEM MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h2>Log New Problem</h2>
    <div class="form-group"><label>Problem Name *</label><input class="form-control" id="p-name" type="text" placeholder="Two Sum"></div>
    <div class="form-group"><label>Topic</label><input class="form-control" id="p-topic" type="text" placeholder="Array"></div>
    <div class="form-group"><label>Pattern Tag</label><input class="form-control" id="p-pattern" type="text" placeholder="Two Pointer | HashMap"></div>
    <div class="form-group"><label>🎯 Trigger — what in the statement signals the pattern</label><input class="form-control" id="p-trigger" type="text" placeholder="longest subarray with ≤ K distinct"></div>
    <div class="form-group"><label>♟ Move — the mechanical action</label><input class="form-control" id="p-move" type="text" placeholder="expand right, shrink left on violation"></div>
    <div class="form-group"><label>Difficulty</label>
      <select class="form-control" id="p-diff">
        <option value="M">Medium (EF 2.5 — standard intervals)</option>
        <option value="H">Hard (EF 2.0 — reviewed more often)</option>
        <option value="L">Easy (EF 3.0 — intervals grow faster)</option>
      </select>
    </div>
    <div class="form-group"><label>Source</label>
      <select class="form-control" id="p-source"><option value="Scaler">Scaler</option><option value="LeetCode">LeetCode</option><option value="NeetCode">NeetCode</option></select>
    </div>
    <div class="form-group"><label>How did it go?</label>
      <select class="form-control" id="p-phase"><option value="Smooth">Solved it ✓ — Review in 3 days</option><option value="Struggled">Struggled ⚠ — Review in 1 day</option><option value="Completed">Knew it cold ★ — Skip rotation (6-month check)</option></select>
    </div>
    <div class="form-group"><label>One-Line Hint</label><input class="form-control" id="p-hint" type="text" placeholder="Use hashmap for O(1) lookup…"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="btn-save" onclick="submitProblem()">Save & Sync</button>
    </div>
  </div>
</div>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycby8l7EkNbMy19gfCuvUYefTArdaY7yMW2qSZLh2mI9-mbRikkjTJ0jYO9B8rgUO3Ic/exec";
let activeTimers = {};
let allData = [];
let currentFilter = 'all';
let currentTopicFilter = 'all';
let _snapshotData = [];
let _allDue = [];
// ── 4 AM DAY BOUNDARY ────────────────────────────────────────
// Your day runs 11:30 AM → 2:30 AM. Anything before 4 AM belongs
// to the previous calendar day so SRS queue never resets mid-session.
function logicalNow(){const n=new Date();n.setHours(n.getHours()-4);return n;}
function todayLogical(){
  const n=logicalNow();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}
// Show logical date in header (before 4 AM still shows previous day)
document.getElementById('date-display').innerText = logicalNow().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
// ── MODAL ────────────────────────────────────────────────────
function openModal(){
  if(localStorage.getItem("admin_key")!=="scaler2026"){alert("🔒 READ-ONLY MODE");return;}
  document.getElementById('addModal').style.display='flex';
}
function closeModal(){
  document.getElementById('addModal').style.display='none';
  ['p-name','p-topic','p-pattern','p-hint','p-trigger','p-move'].forEach(id=>document.getElementById(id).value='');
}
// ── TRIGGER/MOVE encoding ────────────────────────────────────
// Stored inside the existing "Notes / Pattern Used" column so no backend
// redeploy is needed. Format:  <pattern> ⟩T: <trigger> ⟩M: <move>
// Pattern stays first so the card's pattern-tag (notes.split('|')[0]) still works.
function buildNotes(){
  const pat=document.getElementById('p-pattern').value.trim();
  const trg=document.getElementById('p-trigger').value.trim();
  const mov=document.getElementById('p-move').value.trim();
  let out=pat;
  if(trg) out+=' ⟩T: '+trg;
  if(mov) out+=' ⟩M: '+mov;
  return out.trim();
}
// Parse a notes string back into {pattern, trigger, move}
function parseNotes(notes){
  const s=String(notes||'');
  let pattern=s, trigger='', move='';
  const tIdx=s.indexOf('⟩T:'), mIdx=s.indexOf('⟩M:');
  if(tIdx>=0){
    pattern=s.slice(0,tIdx).trim();
    trigger=(mIdx>=0? s.slice(tIdx+3,mIdx): s.slice(tIdx+3)).trim();
  }
  if(mIdx>=0){
    if(tIdx<0)pattern=s.slice(0,mIdx).trim();
    move=s.slice(mIdx+3).trim();
  }
  return {pattern, trigger, move};
}
async function submitProblem(){
  const name=document.getElementById('p-name').value.trim();
  if(!name)return alert("Problem Name is required.");
  const btn=document.getElementById('btn-save');
  btn.innerText="Syncing…";btn.disabled=true;
  try{
    const res=await fetch(API_URL,{method:"POST",body:JSON.stringify({
      action:"add_problem",secret:localStorage.getItem("admin_key"),
      name,
      topic:document.getElementById('p-topic').value.trim()||"Uncategorized",
      source:document.getElementById('p-source').value,
      phase:document.getElementById('p-phase').value,
      difficulty:document.getElementById('p-diff').value,
      hint:document.getElementById('p-hint').value.trim(),
      notes:buildNotes(),
    })});
    const r=await res.json();
    if(r.error||r.status==="Error"){alert("Error: "+(r.error||r.message));return;}
    closeModal();loadQueue();
  }catch(e){alert("Sync failed.");}
  finally{btn.innerText="Save & Sync";btn.disabled=false;}
}
// ── SM-2 PREVIEW — compute next interval client-side ─────────
function previewInterval(p, action){
  const ef=p.ef||2.5;
  const interval=p.interval||7;
  if(action==='Struggled'){
    return Math.max(1,Math.round(interval*0.5));
  } else {
    const newEF=Math.min(4.0,ef+0.1);
    return Math.max(3,Math.round(interval*newEF));
  }
}
// ── SMART QUEUE BUILDER (8 problems: 5 retention + 3 fresh) ──
function shuffle(a){let i=a.length,r;while(i!==0){r=Math.floor(Math.random()*i);i--;[a[i],a[r]]=[a[r],a[i]];}return a;}
function parseDMY(str){
  if(!str)return null;
  if(str.includes('/')){const p=str.split('/');if(p.length===3)return new Date(`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`);}
  if(str.includes('-'))return new Date(str);
  return null;
}
function getSplit(){
  var s=JSON.parse(localStorage.getItem('srs_split_pref')||'{"r":5,"f":3}');
  return s;
}
function buildSmartQueue(data, todayStr){
  const SPLIT=getSplit();
  const RET=SPLIT.r, FRESH=SPLIT.f;
  const isDue=p=>{
    if(!p.reviewDate||p.reviewDate==='')return p.phase==='New'||!p.phase||p.phase==='';
    return p.reviewDate<=todayStr;
  };
  // BLOCK A: RETENTION (up to 5)
  const struggled=data.filter(p=>isDue(p)&&p.phase==='Struggled');
  const smoothDue=data.filter(p=>isDue(p)&&p.phase!=='Struggled'&&p.phase!=='New'&&p.phase!=='');
  const newDue   =data.filter(p=>isDue(p)&&(p.phase==='New'||p.phase===''));
  let blockA=[];
  // Struggled first — up to ~40% of retention slots, min 1
  const strugCap=Math.max(1,Math.ceil(RET*0.4));
  blockA.push(...shuffle([...struggled]).slice(0,strugCap));
  // Smooth/S1/S2 due next — oldest reviewDate first — fill toward RET
  const smoothSorted=[...smoothDue].filter(p=>!blockA.find(q=>q.name===p.name))
    .sort((a,b)=>new Date(a.reviewDate)-new Date(b.reviewDate));
  const smoothCap=Math.max(0,RET-blockA.length-1); // leave 1 for wildcard
  blockA.push(...smoothSorted.slice(0,smoothCap));
  // Wildcard fill — top up to RET with anything else due
  const wildPool=shuffle(data.filter(p=>isDue(p)&&!blockA.find(q=>q.name===p.name)));
  while(blockA.length<RET&&wildPool.length){blockA.push(wildPool.shift());}
  // BLOCK B: FRESH (up to 3 — from New/unseen problems)
  const freshPool=data.filter(p=>(p.phase==='New'||!p.phase||p.phase==='')&&!blockA.find(q=>q.name===p.name));
  let blockB=[];
  // 1. Topic rotation
  const topics=[...new Set(freshPool.map(p=>p.topic).filter(Boolean))].sort();
  if(topics.length>0){
    let tidx=(parseInt(localStorage.getItem('srs_topic_idx')||'0'))%topics.length;
    const rotTopic=topics[tidx];
    localStorage.setItem('srs_topic_idx',String((tidx+1)%topics.length));
    const fromTopic=freshPool.filter(p=>p.topic===rotTopic);
    if(fromTopic.length)blockB.push(shuffle([...fromTopic])[0]);
  }
  // 2. Hard problem from fresh pool
  const hardFresh=freshPool.filter(p=>p.difficulty==='H'&&!blockB.find(q=>q.name===p.name));
  if(hardFresh.length)blockB.push(shuffle([...hardFresh])[0]);
  // 3. Oldest unseen (longest waiting in backlog)
  const oldest=[...freshPool].filter(p=>!blockB.find(q=>q.name===p.name))
    .sort((a,b)=>{const da=parseDMY(a.initialDate),db=parseDMY(b.initialDate);return (da||new Date(0))-(db||new Date(0));});
  if(oldest.length)blockB.push(oldest[0]);
  // Trim/extend blockB to exactly FRESH count
  blockB=blockB.slice(0,FRESH);
  while(blockB.length<FRESH&&freshPool.length){
    const extra=freshPool.find(p=>!blockB.find(q=>q.name===p.name));
    if(!extra)break; blockB.push(extra);
  }
  return {blockA, blockB, all:[...blockA,...blockB]};
}
// ── FILTER CONTROLS ──────────────────────────────────────────
function setFilter(f,el){
  currentFilter=f;
  document.querySelectorAll('.filter-btn:not([data-topic])').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}
function setTopicFilter(t,el){
  currentTopicFilter=t;
  document.querySelectorAll('[data-topic]').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}
function buildTopicFilters(problems){
  const topics=[...new Set(problems.map(p=>p.topic).filter(Boolean))].sort();
  const wrap=document.getElementById('topic-filters');
  wrap.innerHTML=`<button class="filter-btn active" data-topic="all" onclick="setTopicFilter('all',this)">All</button>`+
    topics.map(t=>`<button class="filter-btn" data-topic="${t}" onclick="setTopicFilter('${t.replace(/'/g,"\\'")}',this)">${t}</button>`).join('');
}
function applyFilters(){
  const todayStr=todayLogical(); // 4 AM boundary
  const source=(currentFilter==='all'&&currentTopicFilter==='all')?_snapshotData:_allDue;
  const filtered=source.filter(p=>{
    if(currentTopicFilter!=='all'&&p.topic!==currentTopicFilter)return false;
    if(currentFilter==='all')return true;
    if(currentFilter==='Struggled')return p.phase==='Struggled';
    if(currentFilter==='Smooth')return p.phase!=='Struggled'&&p.phase!=='New'&&p.phase!=='';
    if(currentFilter==='New')return p.phase==='New'||p.phase===''||!p.phase;
    return true;
  });
  renderQueue(filtered,false);
}
// ── LOAD ─────────────────────────────────────────────────────
async function loadQueue(){
  try{
    const res=await fetch(API_URL+"?t="+Date.now());
    allData=await res.json();
    const todayStr=todayLogical(); // 4 AM boundary
    updateDrainMeter(allData);
    // Proportion display
    const dueStruggled=allData.filter(p=>!p.completed&&(p.reviewDate<=todayStr)&&p.phase==='Struggled');
    const dueSmooth=allData.filter(p=>!p.completed&&p.reviewDate&&p.reviewDate<=todayStr&&p.phase!=='Struggled'&&p.phase!=='New'&&p.phase!=='');
    const newProbs=allData.filter(p=>p.phase==='New'||!p.phase||p.phase==='');
    const total=dueStruggled.length+dueSmooth.length;
    if(total>0){
      const sp=Math.round((dueStruggled.length/total)*100);
      const pp=100-sp;
      document.getElementById('prop-segs').innerHTML=
        `<div class="prop-seg" style="width:${sp}%;background:var(--red)"></div>`+
        `<div class="prop-seg" style="width:${pp}%;background:var(--green)"></div>`;
      document.getElementById('prop-chips').innerHTML=
        `<span class="prop-chip pc-struggled">⚠ ${dueStruggled.length} Struggled</span>`+
        `<span class="prop-chip pc-smooth">✓ ${dueSmooth.length} In Review</span>`+
        `<span class="prop-chip pc-new">★ ${newProbs.length} New/Fresh</span>`+
        `<span class="prop-chip pc-total">${allData.length} total problems</span>`;
      document.getElementById('proportion-bar').style.display='flex';
    }
    // Build or restore daily snapshot
    let snapshotDate=localStorage.getItem("srs_date");
    let snapshotNames=JSON.parse(localStorage.getItem("srs_queue_names")||"[]");
    if(snapshotDate!==todayStr||snapshotNames.length===0){
      const built=buildSmartQueue(allData,todayStr);
      const queue=built.all;
      snapshotNames=queue.map(p=>p.name);
      localStorage.setItem("srs_date",todayStr);
      localStorage.setItem("srs_queue_names",JSON.stringify(snapshotNames));
      localStorage.setItem("srs_queue_split",JSON.stringify({
        retentionCount:built.blockA.length,
        freshCount:built.blockB.length
      }));
    }
    const split=JSON.parse(localStorage.getItem("srs_queue_split")||'{"retentionCount":5,"freshCount":3}');
    // Rebuild from snapshot
    _snapshotData=[];
    snapshotNames.forEach(n=>{const f=allData.find(p=>p.name===n);if(f)_snapshotData.push(f);});
    _allDue=allData.filter(p=>{
      if(!p.reviewDate||p.reviewDate==='')return p.phase==='New'||!p.phase;
      return p.reviewDate<=todayStr;
    });
    // Queue info bar
    document.getElementById('qi-blocks').innerHTML=
      `<span class="qi-chip qi-ret">📚 ${split.retentionCount} Retention</span>`+
      `<span class="qi-chip qi-fresh">🌱 ${split.freshCount} Fresh Solving</span>`+
      `<span class="qi-chip qi-total">${_snapshotData.length} total today</span>`;
    document.getElementById('queue-info').style.display='flex';
    buildTopicFilters(_allDue);
    renderQueue(_snapshotData,true,split.retentionCount);
  }catch(e){
    document.getElementById('loading').innerHTML='<div class="empty-state"><h2>Connection Failed</h2><p style="color:var(--muted)">Check console for errors.</p></div>';
    console.error(e);
  }
}
function refreshQueue(){
  if(localStorage.getItem("admin_key")!=="scaler2026"){alert("🔒 READ-ONLY MODE");return;}
  localStorage.removeItem("srs_date");
  localStorage.removeItem("srs_queue_names");
  localStorage.removeItem("srs_queue_split");
  loadQueue();
}

function setSplit(r,f,el){

  localStorage.removeItem("srs_queue_names");
  localStorage.removeItem("srs_queue_split");

}
function initSplitToggle(){
  const s=getSplit();
  document.querySelectorAll('.split-opt').forEach(b=>{
    const[r,f]=b.dataset.split.split(',').map(Number);
    if(r===s.r&&f===s.f)b.classList.add('active');else b.classList.remove('active');
  });
  const sub=document.getElementById('split-sub');
  if(sub)sub.textContent=`SM-2 Adaptive · ${s.r} Retention + ${s.f} Fresh daily`;
}
// ── DRAIN METER — how many problems still await their FIRST review ──
function updateDrainMeter(allData){
  // "Awaiting first review" = phase New (solved once, never SRS-reviewed)
  const awaiting=allData.filter(p=>p.phase==='New'||!p.phase||p.phase==='').length;
  const total=allData.length;
  const reviewed=total-awaiting;
  const pct=total>0?Math.round((reviewed/total)*100):0;
  const meter=document.getElementById('drain-meter');
  const fill=document.getElementById('drain-fill');
  const nums=document.getElementById('drain-nums');
  if(meter&&fill&&nums){
    meter.style.display='block';
    fill.style.width=pct+'%';
    nums.textContent=`${reviewed} reviewed · ${awaiting} awaiting first review · ${pct}% done`;
  }
}
// ── RENDER ────────────────────────────────────────────────────
function renderQueue(problems, showBlocks, retentionCount){
  const qDiv=document.getElementById('queue');
  document.getElementById('loading').style.display='none';
  qDiv.innerHTML='';
  if(!problems.length){
    if(currentFilter==='all'&&currentTopicFilter==='all'){
      triggerSuccess();
      qDiv.innerHTML=`<div class="empty-state fade"><h2>Queue Clear 🚀</h2><p>All done for today. Great work!</p></div>`;
    } else {
      qDiv.innerHTML=`<div class="empty-state fade"><h2>No matches</h2><p>Try a different filter.</p></div>`;
    }
    return;
  }
  problems.forEach((p,idx)=>{
    // Dividers between retention and fresh blocks
    if(showBlocks&&retentionCount){
      if(idx===0){
        qDiv.insertAdjacentHTML('beforeend',`<div class="block-divider"><span class="block-label bl-retention">📚 Retention Block</span><div class="block-line"></div></div>`);
      }
      if(idx===retentionCount){
        qDiv.insertAdjacentHTML('beforeend',`<div class="block-divider"><span class="block-label bl-fresh">🌱 Fresh Solving Block</span><div class="block-line"></div></div>`);
      }
    }
    const cardId=`card-${btoa(p.name).replace(/[^a-zA-Z0-9]/g,'')}`;
    const isFresh=showBlocks&&retentionCount&&idx>=retentionCount;
    const phaseClass=p.phase==='Struggled'?'card-struggled':p.phase==='New'||!p.phase?'card-new':isFresh?'card-fresh':'card-smooth';
    const badgeClass=p.phase==='Struggled'?'b-phase-struggled':p.phase==='New'||!p.phase?'b-phase-new':p.phase==='Mastered'?'b-phase-mastered':'b-phase-smooth';
    const parsed=parseNotes(p.notes||'');
    const pattern=parsed.pattern||'';
    let prettyDate='?',prettyLast='Never';
    try{
      if(p.initialDate&&p.initialDate!==''){
        const ds=p.initialDate.includes('T')?p.initialDate:p.initialDate+'T00:00:00';
        prettyDate=new Date(ds).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
      } else { prettyDate='—'; }
    }catch(e){prettyDate='—';}
    try{
      if(p.lastSolved&&p.lastSolved!=='Never'&&p.lastSolved!==''){
        const ls=p.lastSolved.includes('T')?p.lastSolved:p.lastSolved+'T00:00:00';
        prettyLast=new Date(ls).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
      }
    }catch(e){}
    // SM-2 preview intervals
    const nextSmooth=previewInterval(p,'Smooth');
    const nextStruggled=previewInterval(p,'Struggled');
    const ef=p.ef||2.5;
    const interval=p.interval||7;
    const card=document.createElement('div');
    card.className=`problem-card ${phaseClass} fade`;
    card.id=cardId;
    card.dataset.pname=p.name;
    card.dataset.ppattern=parsed.pattern||'';
    card.dataset.ptrigger=parsed.trigger||'';
    card.dataset.pmove=parsed.move||'';
    card.dataset.phint=p.hint||'';
    card.innerHTML=`
      <div class="card-header">
        <div class="card-title">${p.name}${isFresh?'<span style="font-family:var(--fm);font-size:.58rem;color:var(--orange);margin-left:8px;font-weight:400">NEW</span>':''}</div>
        ${pattern?`<span class="pattern-tag">${pattern.split('|')[0].trim()}</span>`:''}
      </div>
      <div class="meta-row">
        <span class="badge b-topic">${p.topic}</span>
        <span class="badge ${badgeClass}">${p.phase||'New'}</span>
        <span class="badge b-attempt">×${p.attempts||0}</span>
        <span class="badge b-date">Added ${prettyDate}</span>
        <span class="badge" style="background:rgba(168,85,247,.08);color:#c084fc;border:1px solid rgba(168,85,247,.18)">Last ${prettyLast}</span>
        ${p.difficulty?`<span class="badge" style="background:${p.difficulty==='H'?'rgba(239,68,68,.1)':p.difficulty==='M'?'rgba(234,179,8,.1)':'rgba(57,211,83,.1)'};color:${p.difficulty==='H'?'var(--red)':p.difficulty==='M'?'var(--yellow)':'var(--green)'};border:1px solid transparent">${p.difficulty}</span>`:''}
        <span class="badge b-ef">EF ${ef.toFixed(2)}</span>
        <span class="badge" style="background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border)">Now: ${interval}d</span>
      </div>
      <div class="actions">
        <button class="btn-hint" onclick="toggleHint('hint-${cardId}')">💡 Hint</button>
        <button class="btn-tm-edit" onclick="openTMEditor('${cardId}')">✎ Trigger/Move</button>
        <button class="btn-timer" id="btn-timer-${cardId}" onclick="startTimer('${cardId}')">▶ Focus</button>
        <span class="timer-display" id="timer-${cardId}">00:00</span>
        <button class="btn-struggled" onclick="updateProblem('${p.name}','Struggled','${cardId}')">⚠ Struggled → ${nextStruggled}d</button>
        <button class="btn-smooth" onclick="updateProblem('${p.name}','Smooth','${cardId}')">✓ Smooth → ${nextSmooth}d</button>
        <button class="btn-complete" onclick="completeProblem('${p.name}','${cardId}')" title="I know this cold — pull it out of rotation (6-month health check only)">★ Complete</button>
      </div>
      <div class="tm-block">
        <div class="tm-cell tm-trigger">
          <div class="tm-label">🎯 Trigger — recognise it</div>
          ${parsed.trigger?`<div class="tm-text">${parsed.trigger}</div>`:'<div class="tm-text tm-empty">Not recorded — add on next log</div>'}
        </div>
        <div class="tm-cell tm-move">
          <div class="tm-label">♟ Move — recall before revealing</div>
          ${parsed.move?`<div class="tm-text tm-reveal" onclick="this.classList.add('shown')" title="tap to reveal">${parsed.move}</div>`:'<div class="tm-text tm-empty">Not recorded — add on next log</div>'}
        </div>
      </div>
      <div class="tm-editor" id="tmed-${cardId}">
        <div class="tm-field"><label>Pattern</label><input type="text" id="tmpat-${cardId}" placeholder="Sliding Window"></div>
        <div class="tm-field"><label>🎯 Trigger — what signals the pattern</label><input type="text" id="tmtrg-${cardId}" placeholder="longest subarray with ≤ K distinct"></div>
        <div class="tm-field"><label>♟ Move — the mechanical action</label><input type="text" id="tmmov-${cardId}" placeholder="expand right, shrink left on violation"></div>
        <div class="tm-edit-actions">
          <button class="btn-tm-cancel" onclick="closeTMEditor('${cardId}')">Cancel</button>
          <button class="btn-tm-save" id="tmsave-${cardId}" onclick="saveTM('${cardId}')">Save to sheet</button>
        </div>
      </div>
      <div class="sm2-preview">
        <span class="sm2-label">SM-2 Preview:</span>
        <span class="sm2-smooth">✓ Smooth: next in ${nextSmooth}d (EF ${Math.min(4.0,ef+0.1).toFixed(2)})</span>
        <span class="sm2-struggled">⚠ Struggled: next in ${nextStruggled}d (EF ${Math.max(1.3,ef-0.3).toFixed(2)})</span>
      </div>
      <div class="hint-box" id="hint-${cardId}">
        <strong style="color:var(--blue);font-family:var(--fm);font-size:.7rem;text-transform:uppercase;letter-spacing:1px">Algorithm Hint</strong><br><br>
        ${p.hint||'No hint recorded.'}
      </div>`;
    qDiv.appendChild(card);
  });
}

// ── TRIGGER/MOVE INLINE EDITOR ───────────────────────────────
function openTMEditor(cardId){
  if(localStorage.getItem("admin_key")!=="scaler2026"){alert("🔒 READ-ONLY MODE — set admin key to edit");return;}
  const card=document.getElementById(cardId);
  const ed=document.getElementById('tmed-'+cardId);
  if(!card||!ed)return;
  // prefill from data-attributes
  document.getElementById('tmpat-'+cardId).value=card.dataset.ppattern||'';
  document.getElementById('tmtrg-'+cardId).value=card.dataset.ptrigger||'';
  document.getElementById('tmmov-'+cardId).value=card.dataset.pmove||'';
  ed.classList.toggle('open');
  if(ed.classList.contains('open'))document.getElementById('tmtrg-'+cardId).focus();
}
function closeTMEditor(cardId){
  const ed=document.getElementById('tmed-'+cardId);
  if(ed)ed.classList.remove('open');
}
async function saveTM(cardId){
  if(localStorage.getItem("admin_key")!=="scaler2026"){alert("🔒 READ-ONLY MODE");return;}
  const card=document.getElementById(cardId);
  const name=card.dataset.pname;
  const pattern=document.getElementById('tmpat-'+cardId).value.trim();
  const trigger=document.getElementById('tmtrg-'+cardId).value.trim();
  const move=document.getElementById('tmmov-'+cardId).value.trim();
  const btn=document.getElementById('tmsave-'+cardId);
  btn.innerText='Saving…';btn.disabled=true;
  try{
    const res=await fetch(API_URL,{method:"POST",body:JSON.stringify({
      action:"update_notes",secret:localStorage.getItem("admin_key"),
      name,pattern,trigger,move
    })});
    const r=await res.json();
    if(r.error||r.status==="Error"){alert("Error: "+(r.error||r.message));btn.innerText='Save to sheet';btn.disabled=false;return;}
    // update in-memory + data-attrs + live DOM so it shows without reload
    card.dataset.ppattern=pattern;card.dataset.ptrigger=trigger;card.dataset.pmove=move;
    const trgCell=card.querySelector('.tm-trigger');
    const movCell=card.querySelector('.tm-move');
    if(trgCell)trgCell.innerHTML=`<div class="tm-label">🎯 Trigger — recognise it</div>`+
      (trigger?`<div class="tm-text">${trigger}</div>`:'<div class="tm-text tm-empty">Not recorded — add on next log</div>');
    if(movCell)movCell.innerHTML=`<div class="tm-label">♟ Move — recall before revealing</div>`+
      (move?`<div class="tm-text tm-reveal" onclick="this.classList.add('shown')" title="tap to reveal">${move}</div>`:'<div class="tm-text tm-empty">Not recorded — add on next log</div>');
    // update pattern tag in header
    const ptag=card.querySelector('.pattern-tag');
    if(pattern){
      if(ptag)ptag.textContent=pattern.split('|')[0].trim();
    }
    // also update the copy held in allData so re-render keeps it
    const src=allData.find(x=>x.name===name);
    if(src){let enc=pattern;if(trigger)enc+=' ⟩T: '+trigger;if(move)enc+=' ⟩M: '+move;src.notes=enc.trim();}
    closeTMEditor(cardId);
    if(typeof confetti==='function')confetti({particleCount:30,spread:45,origin:{y:.8},colors:['#f97316','#fff']});
  }catch(e){alert("Sync failed.");}
  finally{btn.innerText='Save to sheet';btn.disabled=false;}
}
function startTimer(cardId){
  if(localStorage.getItem("admin_key")!=="scaler2026"){alert("🔒 READ-ONLY MODE");return;}
  if(activeTimers[cardId])return;
  document.getElementById('btn-timer-'+cardId).style.display='none';
  const disp=document.getElementById('timer-'+cardId);
  disp.style.display='inline-block';
  let s=0;
  activeTimers[cardId]=setInterval(()=>{
    s++;
    const m=Math.floor(s/60).toString().padStart(2,'0');
    const sc=(s%60).toString().padStart(2,'0');
    disp.innerText=`${m}:${sc}`;
    if(s>=1800)disp.classList.add('timer-danger');
  },1000);
}
async function updateProblem(name,action,cardId){
  if(localStorage.getItem("admin_key")!=="scaler2026"){alert("🔒 READ-ONLY MODE");return;}
  const card=document.getElementById(cardId);
  card.querySelectorAll('button').forEach(b=>b.disabled=true);
  if(activeTimers[cardId])clearInterval(activeTimers[cardId]);
  try{
    const res=await fetch(API_URL,{method:"POST",body:JSON.stringify({name,action,secret:localStorage.getItem("admin_key")})});
    const r=await res.json();
    if(r.error||r.status==="Error"){alert("Error: "+(r.error||r.message));card.querySelectorAll('button').forEach(b=>b.disabled=false);return;}
    // Graduation celebration
    if(r.graduated){
      confetti({particleCount:80,spread:70,origin:{y:.6},colors:['#a855f7','#fff','#39d353']});
      setTimeout(()=>confetti({particleCount:40,spread:50,origin:{y:.5},colors:['#a855f7','#fff']}),400);
    }
    // Remove from snapshot
    let snap=JSON.parse(localStorage.getItem("srs_queue_names")||"[]");
    snap=snap.filter(n=>n!==name);
    localStorage.setItem("srs_queue_names",JSON.stringify(snap));
    // Show next interval on card before removing
    if(r.newInterval){
      const preview=card.querySelector('.sm2-preview');
      if(preview)preview.innerHTML=`<span style="font-family:var(--fm);font-size:.7rem;color:${action==='Smooth'?'var(--green)':'var(--red)'}">${action==='Smooth'?'✓':'⚠'} Next review: ${r.newInterval} days (${r.newPhase}) · EF: ${r.newEF}</span>`;
    }
    card.style.opacity='0';card.style.transform='scale(0.96)';card.style.transition='.25s';
    setTimeout(()=>{card.remove();if(!document.querySelectorAll('.problem-card').length)renderQueue([],false);},280);
    if(action==='Smooth'&&Math.random()<0.3)confetti({particleCount:40,spread:50,origin:{y:.8},colors:['#39d353','#fff']});
  }catch(e){alert("Sync failed.");card.querySelectorAll('button').forEach(b=>b.disabled=false);}
}
// ── COMPLETE — mark known-cold, pull out of rotation ──
async function completeProblem(name,cardId){
  if(localStorage.getItem("admin_key")!=="scaler2026"){alert("🔒 READ-ONLY MODE");return;}
  if(!confirm("Mark \""+name+"\" as Complete?\n\nIt leaves daily rotation and only returns for a health-check in 6 months. Use this only when you know it cold.")){return;}
  const card=document.getElementById(cardId);
  card.querySelectorAll('button').forEach(b=>b.disabled=true);
  if(activeTimers[cardId])clearInterval(activeTimers[cardId]);
  try{
    const res=await fetch(API_URL,{method:"POST",body:JSON.stringify({name,action:"Complete",secret:localStorage.getItem("admin_key")})});
    const r=await res.json();
    if(r.error||r.status==="Error"){alert("Error: "+(r.error||r.message));card.querySelectorAll('button').forEach(b=>b.disabled=false);return;}
    confetti({particleCount:100,spread:80,origin:{y:.6},colors:['#a855f7','#c084fc','#fff']});
    let snap=JSON.parse(localStorage.getItem("srs_queue_names")||"[]");
    snap=snap.filter(n=>n!==name);
    localStorage.setItem("srs_queue_names",JSON.stringify(snap));
    card.style.opacity='0';card.style.transform='scale(0.96)';card.style.transition='.25s';
    setTimeout(()=>{card.remove();if(!document.querySelectorAll('.problem-card').length)renderQueue([],false);},280);
  }catch(e){alert("Sync failed.");card.querySelectorAll('button').forEach(b=>b.disabled=false);}
}
function triggerSuccess(){
  const end=Date.now()+2500;
  (function f(){
    confetti({particleCount:4,angle:60,spread:50,origin:{x:0},colors:['#39d353','#fff']});
    confetti({particleCount:4,angle:120,spread:50,origin:{x:1},colors:['#39d353','#fff']});
    if(Date.now()<end)requestAnimationFrame(f);
  }());
}
