<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRS Neural Engine | Ananth</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #09090b; --card: #18181b; --border: #3f3f46; --primary: #39d353; --danger: #ef4444; --text: #f4f4f5; --muted: #a1a1aa; --accent: #3b82f6; }
        body { background-color: var(--bg); background-image: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.03) 0%, transparent 50%); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 40px 20px; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        h1 { margin: 0; font-family: 'Space Grotesk', sans-serif; font-size: 1.8rem; letter-spacing: -0.5px; }
        .date-chip { background: rgba(255,255,255,0.05); padding: 6px 14px; border-radius: 50px; font-size: 0.85rem; color: var(--muted); border: 1px solid var(--border); }
        .problem-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); transition: all 0.3s ease; }
        .problem-card:hover { border-color: #71717a; }
        .problem-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .problem-info h3 { margin: 0 0 10px 0; font-size: 1.2rem; font-weight: 600; }
        .meta-tags { display: flex; gap: 8px; flex-wrap: wrap; }
        .badge { padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .b-topic { background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid #555; }
        .b-phase { background: rgba(255, 255, 255, 0.05); color: #d4d4d8; border: 1px solid var(--border); }
        .b-attempt { background: rgba(255, 255, 255, 0.1); color: #fff; border: 1px solid #555; }
        .b-date { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }
        .actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        button { padding: 10px 18px; border-radius: 8px; font-weight: 600; font-size: 0.85rem; border: none; cursor: pointer; transition: 0.2s; font-family: 'Inter', sans-serif; }
        .btn-hint { background: transparent; color: var(--muted); border: 1px solid var(--border); }
        .btn-hint:hover { color: var(--text); border-color: #777; }
        .btn-timer { background: var(--accent); color: #fff; }
        .btn-timer:hover { opacity: 0.8; }
        .timer-display { font-family: 'Space Grotesk', monospace; font-size: 1.1rem; font-weight: 700; display: none; width: 60px; text-align: center; }
        .timer-danger { color: var(--danger); animation: pulse 1s infinite; }
        .btn-struggled { background: transparent; color: #fff; border: 1px dashed #fff; margin-left: auto; }
        .btn-struggled:hover { background: rgba(255,255,255,0.1); }
        .btn-smooth { background: #fff; color: #000; border: 1px solid #fff; }
        .btn-smooth:hover { opacity: 0.8; }
        .btn-add { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
        .btn-add:hover { background: rgba(57, 211, 83, 0.1); box-shadow: 0 0 15px rgba(57,211,83,0.2); }
        button:disabled { opacity: 0.5; pointer-events: none; }
        .hint-box { display: none; background: rgba(59, 130, 246, 0.05); padding: 16px; border-radius: 8px; margin-top: 20px; font-size: 0.95rem; color: #cbd5e1; border-left: 3px solid var(--accent); line-height: 1.5; border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .empty-state { text-align: center; padding: 60px 20px; background: var(--card); border-radius: 16px; border: 1px dashed #3f3f46; }
        
        /* Modal Styles */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 100; align-items: center; justify-content: center; }
        .modal { background: var(--card); border: 1px solid var(--border); width: 90%; max-width: 500px; border-radius: 16px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { width: 100%; box-sizing: border-box; background: #0a0a0a; border: 1px solid var(--border); color: #fff; padding: 12px 15px; border-radius: 8px; font-family: 'Inter'; outline: none; transition: 0.2s; }
        .form-control:focus { border-color: var(--accent); }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 30px; }
        .btn-cancel { background: transparent; border: 1px solid var(--muted); color: var(--muted); }
        .btn-cancel:hover { color: #fff; border-color: #fff; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <p style="margin: 0; color: #fff; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px;">• System Online</p>
            <h1>Nightly Review Queue</h1>
        </div>
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="btn-add" onclick="openModal()">+ Log Problem</button>
            <div class="date-chip" id="date-display"></div>
        </div>
    </div>
    <div id="loading" class="empty-state"><h2 style="color: var(--muted); animation: pulse 1.5s infinite;">Syncing Neural Cache...</h2></div>
    <div id="queue"></div>
</div>

<div class="modal-overlay" id="addModal">
    <div class="modal">
        <h2 style="margin: 0 0 20px 0; font-family: 'Space Grotesk';">Log New Problem</h2>
        
        <div class="form-group">
            <label>Problem Name</label>
            <input type="text" id="p-name" class="form-control" placeholder="e.g. Morris Inorder Traversal">
        </div>
        
        <div style="display: flex; gap: 15px;">
            <div class="form-group" style="flex: 1;">
                <label>Topic</label>
                <input type="text" id="p-topic" class="form-control" placeholder="e.g. Trees">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Source</label>
                <select id="p-source" class="form-control">
                    <option value="Scaler">Scaler</option>
                    <option value="LeetCode">LeetCode</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Initial Status</label>
            <select id="p-phase" class="form-control">
                <option value="Smooth">🚀 Smooth (Review in 8 Days)</option>
                <option value="Struggled">⚠️ Struggled (Review in 4 Days)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Hint / Core Logic (Optional)</label>
            <input type="text" id="p-hint" class="form-control" placeholder="What is the trick to solve this?">
        </div>

        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()" id="btn-cancel">Cancel</button>
            <button class="btn-smooth" onclick="submitProblem()" id="btn-save">Save & Sync</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzcAr2oVXOKjoSMPimm3a0ARrcBSAL8geTNR6WQ8y9aE9WA87U91qm13YKOzShZ1d-R/exec";
    let activeTimers = {}; 

    document.getElementById('date-display').innerText = new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });

    /* MODAL LOGIC */
    function openModal() {
        if (localStorage.getItem("admin_key") !== "scaler2026") {
            alert("🔒 READ-ONLY MODE: You cannot inject data into Ananth's database.");
            return;
        }
        document.getElementById('addModal').style.display = 'flex';
    }
    
    function closeModal() {
        document.getElementById('addModal').style.display = 'none';
        document.getElementById('p-name').value = '';
        document.getElementById('p-topic').value = '';
        document.getElementById('p-hint').value = '';
    }

    async function submitProblem() {
        const name = document.getElementById('p-name').value.trim();
        if (!name) return alert("Problem Name is required.");

        const payload = {
            action: "add_problem",
            secret: localStorage.getItem("admin_key"),
            name: name,
            topic: document.getElementById('p-topic').value.trim() || "Uncategorized",
            source: document.getElementById('p-source').value,
            phase: document.getElementById('p-phase').value,
            hint: document.getElementById('p-hint').value.trim()
        };

        document.getElementById('btn-save').innerText = "Syncing...";
        document.getElementById('btn-save').disabled = true;
        document.getElementById('btn-cancel').disabled = true;

        try {
            const response = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await response.json(); // Reads the server's reply
            
            if (result.error || result.status === "Error") {
                alert("SERVER REJECTED IT: " + (result.error || result.message));
                document.getElementById('btn-save').innerText = "Save & Sync";
                document.getElementById('btn-save').disabled = false;
                document.getElementById('btn-cancel').disabled = false;
                return; // Stops the confetti from firing!
            }

            closeModal();
            triggerSuccess();
            loadQueue(); 
        } catch (error) {
            alert("Failed to inject data.");
        } finally {
            document.getElementById('btn-save').innerText = "Save & Sync";
            document.getElementById('btn-save').disabled = false;
            document.getElementById('btn-cancel').disabled = false;
        }
    }

    /* EXISTING QUEUE LOGIC */
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function smartMix(array, count) {
        if (array.length <= count) return array;
        array.sort((a, b) => new Date(a.initialDate) - new Date(b.initialDate));
        let selected = [];
        if (count === 1) selected.push(array[Math.floor(Math.random() * array.length)]);
        else if (count === 2) { selected.push(array[0]); selected.push(array[array.length - 1]); } 
        else {
            selected.push(array.shift()); selected.push(array.pop()); array = shuffle(array);
            selected.push(...array.slice(0, count - 2));
        }
        return selected;
    }

    async function loadQueue() {
        try {
            const response = await fetch(API_URL + "?t=" + new Date().getTime());
            const data = await response.json();
            const todayDate = new Date();
            const todayStr = todayDate.getFullYear() + "-" + String(todayDate.getMonth() + 1).padStart(2, '0') + "-" + String(todayDate.getDate()).padStart(2, '0');
            
            let dueStruggled = [], dueSmooth = [], newProblems = [];
            
            data.forEach(p => {
                if (p.reviewDate === "Review-Not needed" || p.phase === "Completed") return;
                if (p.phase === "New" || p.reviewDate === "") newProblems.push(p);
                else if (p.reviewDate <= todayStr) {
                    if (p.phase === "Struggled") dueStruggled.push(p);
                    else dueSmooth.push(p); 
                }
            });

            let snapshotDate = localStorage.getItem("srs_date");
            let snapshotNames = JSON.parse(localStorage.getItem("srs_queue_names") || "[]");

            if (snapshotDate !== todayStr || snapshotNames.length === 0) {
                let targetQueue = [];
                targetQueue.push(...smartMix(dueStruggled, Math.min(2, dueStruggled.length)));
                targetQueue.push(...smartMix(dueSmooth, Math.min(2, dueSmooth.length)));
                targetQueue.push(...smartMix(newProblems, Math.min(1, newProblems.length)));

                let remaining = 5 - targetQueue.length;
                let pool = data.filter(p => !targetQueue.find(t => t.name === p.name) && p.reviewDate !== "Review-Not needed" && p.phase !== "Completed" && (p.reviewDate === "" || p.reviewDate <= todayStr));
                if (remaining > 0 && pool.length > 0) targetQueue.push(...shuffle(pool).slice(0, remaining));

                targetQueue = shuffle(targetQueue);
                snapshotNames = targetQueue.map(p => p.name);
                localStorage.setItem("srs_date", todayStr);
                localStorage.setItem("srs_queue_names", JSON.stringify(snapshotNames));
            }

            let finalQueue = [];
            snapshotNames.forEach(name => {
                let found = data.find(p => p.name === name);
                if (found) finalQueue.push(found);
            });

            renderQueue(finalQueue);
        } catch (error) {
            document.getElementById('loading').innerHTML = `<h2>Connection Failed</h2><p>Check the console for errors.</p>`;
        }
    }

    function renderQueue(problems) {
        const queueDiv = document.getElementById('queue');
        document.getElementById('loading').style.display = "none";
        queueDiv.innerHTML = "";

        if (problems.length === 0) {
            triggerSuccess();
            queueDiv.innerHTML = `<div class="empty-state"><h2>Queue Cleared 🚀</h2><p>Your memory cache is optimized for today. Time for rest.</p></div>`;
            return;
        }

        problems.forEach(p => {
            const card = document.createElement('div');
            card.className = "problem-card";
            card.id = `card-${btoa(p.name).replace(/[^a-zA-Z0-9]/g, '')}`; 
            
            let prettyDate = "Unknown";
            if(p.initialDate && p.initialDate !== "Unknown") {
                try { prettyDate = new Date(p.initialDate).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }); } catch(e) {}
            }

            card.innerHTML = `
                <div class="problem-header">
                    <div class="problem-info">
                        <h3>${p.name}</h3>
                        <div class="meta-tags">
                            <span class="badge b-topic">${p.topic}</span>
                            <span class="badge b-phase">Phase: ${p.phase}</span>
                            <span class="badge b-attempt">🔄 ${p.attempts}</span>
                            <span class="badge b-date">📅 Added: ${prettyDate}</span>
                        </div>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn-hint" onclick="toggleHint('hint-${card.id}')">💡 Hint</button>
                    <button class="btn-timer" id="btn-timer-${card.id}" onclick="startTimer('${card.id}')">▶ Start Focus</button>
                    <span class="timer-display" id="timer-${card.id}">00:00</span>
                    
                    <button class="btn-struggled" onclick="updateProblem('${p.name}', 'Struggled', '${card.id}')">⚠️ Struggled</button>
                    <button class="btn-smooth" onclick="updateProblem('${p.name}', 'Smooth', '${card.id}')">🚀 Smooth</button>
                </div>
                <div class="hint-box" id="hint-${card.id}">
                    <strong style="color: var(--accent);">Algorithm Hint:</strong><br>
                    ${p.hint}
                </div>
            `;
            queueDiv.appendChild(card);
        });
    }

    function toggleHint(id) {
        // 🔒 SECURITY LOCK
        if (localStorage.getItem("admin_key") !== "scaler2026") {
            alert("🔒 READ-ONLY MODE: Hints are restricted.");
            return;
        }
        const hintBox = document.getElementById(id);
        hintBox.style.display = hintBox.style.display === 'block' ? 'none' : 'block';
    }

    function startTimer(cardId) {
        // 🔒 SECURITY LOCK
        if (localStorage.getItem("admin_key") !== "scaler2026") {
            alert("🔒 READ-ONLY MODE: Focus timer is restricted.");
            return;
        }
        if (activeTimers[cardId]) return; 

        const btn = document.getElementById(`btn-timer-${cardId}`);
        const display = document.getElementById(`timer-${cardId}`);
        
        btn.style.display = "none"; 
        display.style.display = "inline-block";

        let seconds = 0;
        activeTimers[cardId] = setInterval(() => {
            seconds++;
            let m = Math.floor(seconds / 60).toString().padStart(2, '0');
            let s = (seconds % 60).toString().padStart(2, '0');
            display.innerText = `${m}:${s}`;
            if (seconds >= 1800) display.classList.add('timer-danger');
        }, 1000);
    }

    async function updateProblem(name, action, cardId) {
        if (localStorage.getItem("admin_key") !== "scaler2026") {
            alert("🔒 READ-ONLY MODE: You are viewing a live demo. Database write-access is restricted.");
            return;
        }

        const card = document.getElementById(cardId);
        const buttons = card.querySelectorAll('button');
        buttons.forEach(b => b.disabled = true);
        
        if (activeTimers[cardId]) clearInterval(activeTimers[cardId]);

        const targetBtn = action === 'Smooth' ? buttons[4] : buttons[3];
        const originalText = targetBtn.innerText;
        targetBtn.innerText = "Syncing...";

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ name: name, action: action, secret: localStorage.getItem("admin_key") })
            });
            const result = await response.json();
            
            if (result.error || result.status === "Error") {
                alert("SERVER REJECTED IT: " + (result.error || result.message));
                buttons.forEach(b => b.disabled = false);
                targetBtn.innerText = originalText;
                return; // Stops the card from disappearing!
            }
            
            let currentSnapshot = JSON.parse(localStorage.getItem("srs_queue_names") || "[]");
            currentSnapshot = currentSnapshot.filter(n => n !== name);
            localStorage.setItem("srs_queue_names", JSON.stringify(currentSnapshot));

            card.style.transform = "scale(0.95)";
            card.style.opacity = 0;
            setTimeout(() => {
                card.remove();
                if (document.querySelectorAll('.problem-card').length === 0) renderQueue([]); 
            }, 300);
        } catch (error) {
            alert("Database Sync Failed.");
            buttons.forEach(b => b.disabled = false);
            targetBtn.innerText = originalText;
        }
    }

    function triggerSuccess() {
        var duration = 3 * 1000, end = Date.now() + duration;
        (function frame() {
            confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ffffff', '#888888'] });
            confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ffffff', '#888888'] });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());
    }

    loadQueue();
</script>
</body>
</html>
