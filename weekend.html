<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekend Execution Engine</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212; color: #e0e0e0;
            max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6;
        }
        h1 { color: #ffffff; border-bottom: 2px solid #333; padding-bottom: 10px; }
        
        /* Add Form Styling */
        .add-form {
            background: #1e1e1e; border: 1px solid #333; border-radius: 8px;
            padding: 15px; margin-bottom: 30px; display: flex; gap: 10px; flex-wrap: wrap;
        }
        .add-form input, .add-form select {
            background: #2a2a2a; color: #fff; border: 1px solid #444;
            padding: 8px; border-radius: 4px; flex-grow: 1;
        }
        .add-form button {
            background: #00ffcc; color: #000; font-weight: bold; cursor: pointer;
            border: none; padding: 8px 15px; border-radius: 4px; transition: 0.2s;
        }
        .add-form button:hover { background: #00ccaa; }

        /* Lane Styling */
        .lane {
            background: #1e1e1e; border-radius: 8px; padding: 20px; margin-bottom: 30px;
            border-left: 5px solid #00ffcc;
        }
        .lane h2 { margin-top: 0; color: #00ffcc; }
        .lane-2 { border-left-color: #ff00ff; }
        .lane-2 h2 { color: #ff00ff; }
        ul { list-style-type: none; padding: 0; }
        li {
            background: #2a2a2a; margin: 10px 0; padding: 15px; border-radius: 5px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .prob-info { display: flex; align-items: center; }
        a { color: #4da6ff; text-decoration: none; font-weight: bold; font-size: 1.1em; }
        a:hover { text-decoration: underline; }
        .topic-tag {
            background-color: #333; color: #aaa; padding: 3px 8px; border-radius: 4px;
            font-size: 0.8em; margin-right: 15px; text-transform: uppercase;
        }
        .done-btn {
            background: #444; color: #fff; border: none; padding: 8px 12px;
            border-radius: 4px; cursor: pointer; font-size: 0.9em; transition: 0.2s;
        }
        .done-btn:hover { background: #555; color: #00ffcc; }
    </style>
</head>
<body>

    <h1>Weekend Deep-Dive Engine</h1>
    
    <div class="add-form" id="addForm">
        <select id="newLane">
            <option value="Backlog">Backlog Lane</option>
            <option value="Recent">Recent Lane</option>
        </select>
        <input type="text" id="newTopic" placeholder="Topic (e.g., Heaps)">
        <input type="text" id="newTitle" placeholder="Problem Title">
        <input type="text" id="newUrl" placeholder="URL">
        <button onclick="addProblem()" id="addBtn">+ Add to Queue</button>
    </div>

    <div class="lane">
        <h2>Lane 1: Backlog Burner</h2>
        <ul id="lane1-list"></ul>
    </div>

    <div class="lane lane-2">
        <h2>Lane 2: Recent Anchor</h2>
        <ul id="lane2-list"></ul>
    </div>

    <script>
        // ==========================================
        // 🚨 PASTE YOUR GOOGLE APPS SCRIPT URL HERE 🚨
        // ==========================================
        const apiUrl = "https://script.google.com/macros/s/AKfycbwbYPyrM2jMQktpMpCvuS8f0iN3vhkx2fWmwdQqqBilj3ITEEUcSZBq1bN_5qVUs1CCoQ/exec";

        async function loadQueue() {
            document.getElementById("lane1-list").innerHTML = "<li>Loading live database...</li>";
            document.getElementById("lane2-list").innerHTML = "<li>Loading live database...</li>";
            
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                renderLane(data.backlog, "lane1-list");
                renderLane(data.recent, "lane2-list");
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById("lane1-list").innerHTML = "<li>Error connecting to database.</li>";
            }
        }

        function renderLane(queue, elementId) {
            const list = document.getElementById(elementId);
            list.innerHTML = ""; 

            if (queue.length === 0) {
                list.innerHTML = "<li>🎉 Queue empty. You cleared this lane!</li>";
                return;
            }

            queue.forEach(prob => {
                const li = document.createElement("li");
                li.innerHTML = `
                    <div class="prob-info">
                        <span class="topic-tag">${prob.topic}</span>
                        <a href="${prob.url}" target="_blank">${prob.title}</a>
                    </div>
                    <button class="done-btn" onclick="markDone(${prob.row}, this)">✔️ Mark Done</button>
                `;
                list.appendChild(li);
            });
        }

        async function markDone(rowNumber, btnElement) {
            btnElement.innerHTML = "Updating...";
            btnElement.style.background = "#666";
            
            // Call the API to mark it done
            await fetch(`${apiUrl}?action=markDone&row=${rowNumber}`);
            
            // Reload the queue so the next problem slides up!
            loadQueue();
        }

        async function addProblem() {
            const lane = document.getElementById("newLane").value;
            const topic = document.getElementById("newTopic").value;
            const title = document.getElementById("newTitle").value;
            const url = document.getElementById("newUrl").value;
            const addBtn = document.getElementById("addBtn");

            if (!topic || !title || !url) {
                alert("Please fill in all fields before adding.");
                return;
            }

            addBtn.innerHTML = "Adding...";
            addBtn.disabled = true;

            // Call the API to add the row
            const requestUrl = `${apiUrl}?action=add&lane=${encodeURIComponent(lane)}&topic=${encodeURIComponent(topic)}&title=${encodeURIComponent(title)}&url=${encodeURIComponent(url)}`;
            await fetch(requestUrl);

            // Clear the form and reload
            document.getElementById("newTopic").value = "";
            document.getElementById("newTitle").value = "";
            document.getElementById("newUrl").value = "";
            addBtn.innerHTML = "+ Add to Queue";
            addBtn.disabled = false;
            
            loadQueue();
        }

        // Run on load
        loadQueue();
    </script>

</body>
</html>
