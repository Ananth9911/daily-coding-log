<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekend | Ananth</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root{--bg:#030303;--bg2:#0a0a0a;--bg3:#111;--card:#0d0d0d;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);--text:#f4f4f5;--muted:#71717a;--dim:#3f3f46;--green:#39d353;--blue:#3b82f6;--yellow:#eab308;--red:#ef4444;--purple:#a855f7;--orange:#f97316;--fd:'Space Grotesk',sans-serif;--fm:'IBM Plex Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--fd);min-height:100vh;padding:40px 20px;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at 50% 0%,black 30%,transparent 80%);pointer-events:none;z-index:0}
.wrap{max-width:900px;margin:0 auto;position:relative;z-index:1}
.hdr{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--border);padding-bottom:20px;margin-bottom:24px;flex-wrap:wrap;gap:14px}
.hdr-left{display:flex;align-items:center;gap:12px}
.sys-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);box-shadow:0 0 10px var(--orange);animation:pulse 2s ease infinite;flex-shrink:0}
h1{font-size:1.7rem;font-weight:700;letter-spacing:-.5px}
.sub{font-family:var(--fm);font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:3px}
.hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.nav-link{font-family:var(--fm);font-size:.7rem;color:var(--muted);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:6px;transition:.18s}
.nav-link:hover{color:var(--text);border-color:var(--border2)}
.date-chip{font-family:var(--fm);font-size:.72rem;color:var(--muted);background:var(--bg2);border:1px solid var(--border);padding:6px 14px;border-radius:20px}

/* DAY TOGGLE */
.day-toggle{display:flex;gap:4px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:22px}
.day-opt{flex:1;font-family:var(--fd);font-size:.85rem;font-weight:600;padding:10px;border-radius:7px;border:none;background:transparent;color:var(--muted);cursor:pointer;transition:.15s}
.day-opt.active{background:rgba(249,115,22,.15);color:var(--orange)}
.day-opt .day-sub{display:block;font-family:var(--fm);font-size:.58rem;font-weight:400;margin-top:2px;letter-spacing:.5px}

/* OVERALL PROGRESS */
.day-progress{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:20px}
.dp-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.dp-label{font-family:var(--fm);font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}
.dp-nums{font-family:var(--fm);font-size:.75rem;color:var(--text)}
.dp-bar{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.dp-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--orange),#fb923c);transition:width .6s ease;width:0%}

/* BLOCK CARDS */
.block{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden;transition:.2s}
.block.done{border-color:rgba(57,211,83,.3);background:rgba(57,211,83,.02)}
.block-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.block-check{width:26px;height:26px;border-radius:8px;border:2px solid var(--border2);background:var(--bg2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.18s;font-size:.9rem;color:transparent;margin-top:2px}
.block-check:hover{border-color:var(--green)}
.block-check.checked{background:var(--green);border-color:var(--green);color:#000}
.block-head{flex:1}
.block-title{font-size:1.05rem;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.block-icon{font-size:1.1rem}
.block-desc{font-size:.82rem;color:var(--muted);line-height:1.5}
.accent-lld{border-left:3px solid var(--purple)}
.accent-srs{border-left:3px solid var(--blue)}
.accent-lc{border-left:3px solid var(--orange)}
.accent-contest{border-left:3px solid var(--red)}
.accent-sql{border-left:3px solid var(--green)}

/* LIVE STAT */
.live-stat{display:inline-flex;align-items:center;gap:6px;font-family:var(--fm);font-size:.62rem;padding:3px 9px;border-radius:5px;background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.live-stat.ls-orange{background:rgba(249,115,22,.1);color:var(--orange);border-color:rgba(249,115,22,.2)}
.live-stat.ls-loading{color:var(--muted);background:var(--bg2);border-color:var(--border)}

/* TARGET CHIPS */
.targets{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.target-chip{font-family:var(--fm);font-size:.68rem;padding:6px 12px;border-radius:7px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;gap:7px;cursor:pointer;transition:.15s;user-select:none}
.target-chip:hover{border-color:var(--border2);color:var(--text)}
.target-chip.hit{background:rgba(57,211,83,.1);border-color:rgba(57,211,83,.25);color:var(--green)}
.target-chip .tc-box{width:14px;height:14px;border-radius:4px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.6rem}

/* COUNTER (LeetCode target) */
.counter{display:flex;align-items:center;gap:14px;margin-top:14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px}
.counter-label{font-family:var(--fm);font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.counter-controls{display:flex;align-items:center;gap:10px;margin-left:auto}
.cnt-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:1.1rem;cursor:pointer;transition:.15s}
.cnt-btn:hover{border-color:var(--orange);color:var(--orange)}
.cnt-val{font-family:var(--fm);font-size:1.1rem;font-weight:600;min-width:52px;text-align:center}
.cnt-target{color:var(--muted);font-size:.9rem}

/* TIMER */
.timer-wrap{display:flex;align-items:center;gap:12px;margin-top:14px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;flex-wrap:wrap}
.timer-label{font-family:var(--fm);font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.timer-clock{font-family:var(--fm);font-size:1.4rem;font-weight:600;color:var(--yellow);min-width:90px}
.timer-clock.danger{color:var(--red);animation:pulse 1s infinite}
.timer-clock.over{color:var(--green)}
.tbtn{font-family:var(--fd);font-weight:600;font-size:.75rem;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;transition:.15s}
.tbtn:hover{border-color:var(--border2)}
.tbtn.primary{background:rgba(168,85,247,.15);color:var(--purple);border-color:rgba(168,85,247,.3)}
.tbtn.primary:hover{background:rgba(168,85,247,.25)}
.timer-preset{font-family:var(--fm);font-size:.6rem;color:var(--dim)}

.reset-row{text-align:center;margin-top:24px}
.btn-reset{font-family:var(--fm);font-size:.68rem;color:var(--muted);background:transparent;border:1px solid var(--border);border-radius:8px;padding:8px 16px;cursor:pointer;transition:.15s}
.btn-reset:hover{color:var(--red);border-color:rgba(239,68,68,.3)}
.note{font-family:var(--fm);font-size:.62rem;color:var(--dim);text-align:center;margin-top:10px;line-height:1.6}
@keyframes pulse{50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade{animation:fadeIn .3s ease}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-left">
      <div class="sys-dot"></div>
      <div>
        <h1>Weekend Skeleton</h1>
        <div class="sub">Structured Sat/Sun · the anti-drain system</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="date-chip" id="date-display"></div>
      <a href="dashboard.html" class="nav-link">← Hub</a>
    </div>
  </div>

  <div class="day-toggle">
    <button class="day-opt" id="opt-sat" onclick="setDay('sat')">Saturday<span class="day-sub">BUILD DAY</span></button>
    <button class="day-opt" id="opt-sun" onclick="setDay('sun')">Sunday<span class="day-sub">CONTEST + CONSOLIDATE</span></button>
  </div>

  <div class="day-progress">
    <div class="dp-top">
      <span class="dp-label" id="dp-label">Saturday Progress</span>
      <span class="dp-nums" id="dp-nums">0 / 0 blocks</span>
    </div>
    <div class="dp-bar"><div class="dp-fill" id="dp-fill"></div></div>
  </div>

  <div id="blocks"></div>

  <div class="reset-row">
    <button class="btn-reset" onclick="resetDay()">↺ Reset this day's checkboxes</button>
    <div class="note">Progress is kept in memory for this session only. Live counts pull from your SRS + Problem Engine backends.</div>
  </div>
</div>

<script>
// ── WIRED TO YOUR EXISTING BACKENDS ──────────────────────────
const SRS_API = "https://script.google.com/macros/s/AKfycby8l7EkNbMy19gfCuvUYefTArdaY7yMW2qSZLh2mI9-mbRikkjTJ0jYO9B8rgUO3Ic/exec";
// Problem Engine getProgress — same deployment as ProblemEngine.gs (uses ?action=getProgress)
// If your Problem Engine is a SEPARATE deployment, replace this URL. Left same-project by default.
const PE_API  = "https://script.google.com/macros/s/AKfycby8l7EkNbMy19gfCuvUYefTArdaY7yMW2qSZLh2mI9-mbRikkjTJ0jYO9B8rgUO3Ic/exec";

// State (session-only, no localStorage per artifact constraints)
let state = { day:'sat', checks:{}, counters:{}, targets:{} };

// ── BLOCK DEFINITIONS ─────────────────────────────────────────
const BLOCKS = {
  sat: [
    { id:'sat-lld', accent:'accent-lld', icon:'🏗', title:'LLD Implementation (timed, solo)',
      desc:'Take the case study whose design + first code class are done. Close the video. Implement from a blank file with the timer running. THEN watch Kasera and diff.',
      timer:{ preset:90, label:'Machine-coding clock' } },
    { id:'sat-srs', accent:'accent-srs', icon:'🔁', title:'SRS — 8 problems',
      desc:'Your daily SRS queue. Blind re-solve, don\'t re-read. If you can\'t solve from blank, it isn\'t learned.',
      liveSrs:true },
    { id:'sat-lc', accent:'accent-lc', icon:'⚡', title:'LeetCode — targeted (breadth-first)',
      desc:'Not "solve some" — hit the number. 2-3 reps in the current pattern until one is solved COLD, then jump patterns. Don\'t exhaust a topic.',
      counter:{ default:4, label:'Problems solved' }, livePe:true },
    { id:'sat-sql', accent:'accent-sql', icon:'🗄', title:'SQL — 1 problem',
      desc:'The one you keep skipping on weekdays. Anchor it here as a fallback so it never hits zero for the week.',
      targets:['1 SQL problem'] }
  ],
  sun: [
    { id:'sun-srs', accent:'accent-srs', icon:'🔁', title:'SRS — 8 problems',
      desc:'Same queue, blind re-solve. Consistency is your one proven strength — protect it.',
      liveSrs:true },
    { id:'sun-contest', accent:'accent-contest', icon:'🏆', title:'LC Contest + Upsolve',
      desc:'Do the live contest (or a virtual one if none). Then UPSOLVE — the problems you couldn\'t finish are where the value is, not the ones you cleared. This is your on-the-spot-solving training.',
      timer:{ preset:90, label:'Contest clock' },
      targets:['Attempted contest','Upsolved unsolved Qs'] },
    { id:'sun-lc', accent:'accent-lc', icon:'⚡', title:'LeetCode — targeted (untagged mix)',
      desc:'Pull problems WITHOUT the pattern label showing. Deciding cold that it\'s sliding window is the skill — not executing it once told.',
      counter:{ default:3, label:'Cold problems solved' }, livePe:true },
    { id:'sun-outreach', accent:'accent-lc', icon:'💬', title:'Batch LinkedIn notes (20)',
      desc:'Generate the week\'s connection notes in one sitting so weekdays are pure send-on-autopilot. Use the Outreach Engine.',
      targets:['20 notes generated','Logged in tracker'] }
  ]
};

function todayName(){
  const d=new Date().getDay();
  return d===0?'sun':d===6?'sat':null;
}

function initDay(){
  const t=todayName();
  state.day = t || 'sat';
  document.getElementById('date-display').innerText =
    new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'});
  setDay(state.day, true);
}

function setDay(day, silent){
  state.day=day;
  document.getElementById('opt-sat').classList.toggle('active',day==='sat');
  document.getElementById('opt-sun').classList.toggle('active',day==='sun');
  document.getElementById('dp-label').innerText = (day==='sat'?'Saturday':'Sunday')+' Progress';
  render();
  fetchLive();
}

function render(){
  const wrap=document.getElementById('blocks');
  const list=BLOCKS[state.day];
  wrap.innerHTML='';
  list.forEach(b=>{
    const checked = state.checks[b.id];
    const card=document.createElement('div');
    card.className=`block ${b.accent} fade ${checked?'done':''}`;
    card.id='block-'+b.id;
    let inner=`
      <div class="block-top">
        <div class="block-check ${checked?'checked':''}" onclick="toggleCheck('${b.id}')">${checked?'✓':''}</div>
        <div class="block-head">
          <div class="block-title"><span class="block-icon">${b.icon}</span>${b.title}
            ${b.liveSrs?`<span class="live-stat ls-loading" id="live-${b.id}">SRS due: …</span>`:''}
            ${b.livePe?`<span class="live-stat ls-orange ls-loading" id="livepe-${b.id}">engine: …</span>`:''}
          </div>
          <div class="block-desc">${b.desc}</div>
        </div>
      </div>`;
    if(b.timer){
      inner+=`
      <div class="timer-wrap">
        <span class="timer-label">${b.timer.label}</span>
        <span class="timer-clock" id="clock-${b.id}">${String(b.timer.preset).padStart(2,'0')}:00</span>
        <button class="tbtn primary" id="tbtn-${b.id}" onclick="startTimer('${b.id}',${b.timer.preset})">▶ Start</button>
        <button class="tbtn" onclick="stopTimer('${b.id}')">⏸ Pause</button>
        <button class="tbtn" onclick="resetTimer('${b.id}',${b.timer.preset})">↺</button>
        <span class="timer-preset">counts down from ${b.timer.preset}m, then counts UP (overtime in green)</span>
      </div>`;
    }
    if(b.counter){
      const val = state.counters[b.id] ?? 0;
      const tgt = state.targets[b.id] ?? b.counter.default;
      inner+=`
      <div class="counter">
        <span class="counter-label">${b.counter.label}</span>
        <div class="counter-controls">
          <button class="cnt-btn" onclick="bumpTarget('${b.id}',-1)" title="lower target">–</button>
          <span class="cnt-val" id="cval-${b.id}">${val}<span class="cnt-target"> / <span id="ctgt-${b.id}">${tgt}</span></span></span>
          <button class="cnt-btn" onclick="bumpTarget('${b.id}',1)" title="raise target">+</button>
          <button class="cnt-btn" style="margin-left:8px;border-color:var(--green);color:var(--green)" onclick="bumpCount('${b.id}',1)" title="+1 solved">✓</button>
        </div>
      </div>`;
    }
    if(b.targets){
      inner+=`<div class="targets">`+
        b.targets.map((t,i)=>{
          const key=b.id+'-t'+i;
          const hit=state.checks[key];
          return `<span class="target-chip ${hit?'hit':''}" onclick="toggleCheck('${key}')">
            <span class="tc-box">${hit?'✓':''}</span>${t}</span>`;
        }).join('')+`</div>`;
    }
    card.innerHTML=inner;
    wrap.appendChild(card);
  });
  updateProgress();
}

// ── CHECKS ────────────────────────────────────────────────────
function toggleCheck(id){
  state.checks[id]=!state.checks[id];
  render();
  const list=BLOCKS[state.day];
  const allMain=list.every(b=>state.checks[b.id]);
  if(allMain) celebrate();
}
function updateProgress(){
  const list=BLOCKS[state.day];
  const done=list.filter(b=>state.checks[b.id]).length;
  const total=list.length;
  document.getElementById('dp-nums').innerText=`${done} / ${total} blocks`;
  document.getElementById('dp-fill').style.width=(total?done/total*100:0)+'%';
}

// ── COUNTER + TARGET ──────────────────────────────────────────
function bumpCount(id,d){
  state.counters[id]=Math.max(0,(state.counters[id]??0)+d);
  const el=document.getElementById('cval-'+id);
  const tgt=state.targets[id] ?? BLOCKS[state.day].find(b=>b.id===id).counter.default;
  if(el)el.childNodes[0].nodeValue=state.counters[id];
  if(state.counters[id]>=tgt && !state.checks[id]){ state.checks[id]=true; render(); confettiSmall(); }
}
function bumpTarget(id,d){
  const def=BLOCKS[state.day].find(b=>b.id===id).counter.default;
  state.targets[id]=Math.max(1,(state.targets[id]??def)+d);
  const el=document.getElementById('ctgt-'+id);
  if(el)el.innerText=state.targets[id];
}

// ── TIMERS ────────────────────────────────────────────────────
let timers={};
function startTimer(id,mins){
  if(timers[id]) return;
  const btn=document.getElementById('tbtn-'+id); if(btn)btn.innerText='● Running';
  if(timers[id+'_sec']===undefined) timers[id+'_sec']=mins*60;
  timers[id]=setInterval(()=>{
    timers[id+'_sec']--;
    renderClock(id,mins);
  },1000);
}
function stopTimer(id){ if(timers[id]){clearInterval(timers[id]);timers[id]=null;const b=document.getElementById('tbtn-'+id);if(b)b.innerText='▶ Resume';} }
function resetTimer(id,mins){ if(timers[id])clearInterval(timers[id]);timers[id]=null;timers[id+'_sec']=mins*60;const b=document.getElementById('tbtn-'+id);if(b)b.innerText='▶ Start';renderClock(id,mins);}
function renderClock(id,mins){
  const s=timers[id+'_sec'];
  const clock=document.getElementById('clock-'+id); if(!clock)return;
  const abs=Math.abs(s);
  const m=Math.floor(abs/60).toString().padStart(2,'0');
  const sec=(abs%60).toString().padStart(2,'0');
  clock.innerText=(s<0?'+':'')+m+':'+sec;
  clock.classList.toggle('danger', s<=300 && s>0);
  clock.classList.toggle('over', s<0);
  if(s===0){ confettiSmall(); }
}

// ── LIVE DATA FROM BACKENDS ───────────────────────────────────
async function fetchLive(){
  // SRS due count
  BLOCKS[state.day].filter(b=>b.liveSrs).forEach(async b=>{
    const el=document.getElementById('live-'+b.id); if(!el)return;
    try{
      const r=await fetch(SRS_API+'?action=srs&t='+Date.now());
      const data=await r.json();
      const today=new Date();today.setHours(today.getHours()-4);
      const ts=today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
      const due=(Array.isArray(data)?data:[]).filter(p=>{
        if(p.completed)return false;
        if(!p.reviewDate||p.reviewDate==='')return p.phase==='New'||!p.phase;
        return p.reviewDate<=ts;
      }).length;
      el.className='live-stat'; el.innerText=`SRS due: ${due}`;
    }catch(e){ el.className='live-stat'; el.innerText='SRS: offline'; }
  });
  // Problem Engine progress
  BLOCKS[state.day].filter(b=>b.livePe).forEach(async b=>{
    const el=document.getElementById('livepe-'+b.id); if(!el)return;
    try{
      const r=await fetch(PE_API+'?action=getProgress&t='+Date.now());
      const d=await r.json();
      if(d&&d.ok){
        const openVars=(d.variations||[]).filter(v=>!v.complete).length;
        el.className='live-stat ls-orange';
        el.innerText=`${d.totalDone}/${d.totalProblems} done · ${openVars} open variations`;
      } else { el.className='live-stat ls-orange'; el.innerText='engine: n/a'; }
    }catch(e){ el.className='live-stat ls-orange'; el.innerText='engine: offline'; }
  });
}

// ── FX ────────────────────────────────────────────────────────
function celebrate(){ confetti({particleCount:100,spread:80,origin:{y:.6},colors:['#f97316','#fb923c','#fff','#39d353']}); }
function confettiSmall(){ confetti({particleCount:40,spread:50,origin:{y:.7},colors:['#f97316','#fff']}); }
function resetDay(){
  const list=BLOCKS[state.day];
  list.forEach(b=>{
    delete state.checks[b.id]; delete state.counters[b.id];
    if(b.targets)b.targets.forEach((t,i)=>delete state.checks[b.id+'-t'+i]);
  });
  render();
}

initDay();
</script>
</body></html>
