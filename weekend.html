<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekend Execution Engine | Ananth</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
:root{--bg:#030303;--bg2:#0a0a0a;--card:#0d0d0d;--border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);--text:#f4f4f5;--muted:#71717a;--dim:#3f3f46;--green:#39d353;--blue:#3b82f6;--yellow:#eab308;--red:#ef4444;--purple:#a855f7;--fd:'Space Grotesk',sans-serif;--fm:'IBM Plex Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--fd);min-height:100vh;padding:40px 20px;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse at 50% 0%,black 30%,transparent 80%);pointer-events:none;z-index:0}
.wrap{max-width:900px;margin:0 auto;position:relative;z-index:1}
.hdr{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--border);padding-bottom:20px;margin-bottom:28px;flex-wrap:wrap;gap:14px}
.hdr-left{display:flex;align-items:center;gap:12px}
.sys-dot{width:8px;height:8px;border-radius:50%;background:var(--purple);box-shadow:0 0 10px var(--purple);animation:pulse 2s ease infinite;flex-shrink:0}
h1{font-size:1.7rem;font-weight:700;letter-spacing:-.5px}
.sub{font-family:var(--fm);font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-top:3px}
.hdr-right{display:flex;align-items:center;gap:10px}
.nav-link{font-family:var(--fm);font-size:.7rem;color:var(--muted);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:6px;transition:.18s}
.nav-link:hover{color:var(--text);border-color:var(--border2)}
.count-pill{font-family:var(--fm);font-size:.7rem;color:var(--muted);background:var(--bg2);border:1px solid var(--border);padding:5px 12px;border-radius:14px}

/* ADD FORM */
.add-form{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:24px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.add-form select,.add-form input{font-family:var(--fd);background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;font-size:.8rem;outline:none;flex:1;min-width:110px;transition:.2s}
.add-form select:focus,.add-form input:focus{border-color:var(--purple)}
.btn-add{font-family:var(--fd);font-size:.8rem;font-weight:700;padding:9px 16px;border-radius:8px;background:rgba(168,85,247,.15);color:var(--purple);border:1px solid rgba(168,85,247,.35);cursor:pointer;white-space:nowrap;transition:.18s}
.btn-add:hover{background:rgba(168,85,247,.25);box-shadow:0 0 14px rgba(168,85,247,.25)}

/* LANES */
.lanes{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:680px){.lanes{grid-template-columns:1fr}}
.lane{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.lane-backlog{border-top:3px solid var(--blue)}
.lane-recent{border-top:3px solid var(--purple)}
.lane-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.lane-title{font-size:.9rem;font-weight:700}
.lane-backlog .lane-title{color:var(--blue)}
.lane-recent .lane-title{color:var(--purple)}
.lane-count{font-family:var(--fm);font-size:.65rem;padding:3px 9px;border-radius:10px;background:rgba(255,255,255,.05);color:var(--muted)}
.lane-body{padding:12px}
.prob-item{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;transition:.18s}
.prob-item:hover{border-color:var(--border2)}
.prob-item:last-child{margin-bottom:0}
.prob-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px}
.prob-name{font-size:.85rem;font-weight:600;flex:1;line-height:1.3}
.prob-topic{font-family:var(--fm);font-size:.6rem;padding:2px 7px;border-radius:4px;background:rgba(255,255,255,.06);color:var(--muted);white-space:nowrap;flex-shrink:0}
.prob-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.prob-url{font-family:var(--fm);font-size:.62rem;color:var(--blue);text-decoration:none}
.prob-url:hover{text-decoration:underline}
.btn-done{font-family:var(--fd);font-size:.72rem;font-weight:700;background:rgba(57,211,83,.12);color:var(--green);border:1px solid rgba(57,211,83,.3);border-radius:6px;padding:5px 12px;cursor:pointer;transition:.18s}
.btn-done:hover{background:rgba(57,211,83,.22);box-shadow:0 0 10px rgba(57,211,83,.2)}
.empty-lane{text-align:center;padding:28px;color:var(--muted);font-family:var(--fm);font-size:.72rem}
.lock-banner{background:rgba(234,179,8,.05);border:1px solid rgba(234,179,8,.15);border-radius:10px;padding:10px 16px;font-family:var(--fm);font-size:.68rem;color:var(--yellow);margin-bottom:18px;display:none}
@keyframes pulse{50%{opacity:.4}}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.fade{animation:fadeIn .25s ease}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-left">
      <div class="sys-dot"></div>
      <div>
        <h1>Weekend Execution</h1>
        <div class="sub">Scaler Additional Problem Queue</div>
      </div>
    </div>
    <div class="hdr-right">
      <span class="count-pill" id="total-pill">Loading…</span>
      <a href="dashboard.html" class="nav-link">← Hub</a>
    </div>
  </div>

  <div class="lock-banner" id="lock-banner">🔒 Read-only — Only Ananth can mark problems done or add new ones.</div>

  <div class="add-form" id="add-form">
    <select id="add-lane"><option value="Backlog">Backlog</option><option value="Recent">Recent</option></select>
    <input id="add-topic" type="text" placeholder="Topic (DP, Graph…)" style="max-width:130px">
    <input id="add-title" type="text" placeholder="Problem name *" style="flex:2">
    <input id="add-url" type="text" placeholder="Scaler URL (optional)">
    <button class="btn-add" onclick="addProblem()">+ Add</button>
  </div>

  <div class="lanes">
    <div class="lane lane-backlog">
      <div class="lane-hdr">
        <div class="lane-title">📦 Backlog</div>
        <span class="lane-count" id="cnt-backlog">0</span>
      </div>
      <div class="lane-body" id="lane-backlog"><div class="empty-lane">Loading…</div></div>
    </div>
    <div class="lane lane-recent">
      <div class="lane-hdr">
        <div class="lane-title">🆕 Recent</div>
        <span class="lane-count" id="cnt-recent">0</span>
      </div>
      <div class="lane-body" id="lane-recent"><div class="empty-lane">Loading…</div></div>
    </div>
  </div>
</div>

<script>
const apiUrl = "https://script.google.com/macros/s/AKfycbwbYPyrM2jMQktpMpCvuS8f0iN3vhkx2fWmwdQqqBilj3ITEEUcSZBq1bN_5qVUs1CCoQ/exec";
const isAdmin = () => localStorage.getItem("admin_key") === "scaler2026";

async function load() {
  if (!isAdmin()) {
    document.getElementById('lock-banner').style.display = 'block';
    document.getElementById('add-form').style.opacity = '0.4';
    document.getElementById('add-form').style.pointerEvents = 'none';
  }
  try {
    const r = await fetch(apiUrl + "?t=" + Date.now());
    const d = await r.json();
    render(d.backlog||[], d.recent||[]);
  } catch(e) {
    document.getElementById('lane-backlog').innerHTML = '<div class="empty-lane">API not connected.</div>';
    document.getElementById('lane-recent').innerHTML  = '<div class="empty-lane">API not connected.</div>';
  }
}

function render(backlog, recent) {
  document.getElementById('cnt-backlog').textContent = backlog.length;
  document.getElementById('cnt-recent').textContent  = recent.length;
  document.getElementById('total-pill').textContent  = (backlog.length + recent.length) + ' pending';
  document.getElementById('lane-backlog').innerHTML  = backlog.length ? backlog.map(p => itemHTML(p)).join('') : '<div class="empty-lane">Backlog clear ✓</div>';
  document.getElementById('lane-recent').innerHTML   = recent.length  ? recent.map(p => itemHTML(p)).join('') : '<div class="empty-lane">No recent problems added.</div>';
}

function itemHTML(p) {
  const url  = p.url&&p.url!=='undefined' ? `<a class="prob-url" href="${p.url}" target="_blank">Open ↗</a>` : '';
  const done = isAdmin() ? `<button class="btn-done" onclick="markDone(${p.row},this)">✓ Done</button>` : '';
  return `<div class="prob-item fade" id="pi-${p.row}">
    <div class="prob-top"><div class="prob-name">${p.title}</div><span class="prob-topic">${p.topic||'—'}</span></div>
    <div class="prob-actions">${url}${done}</div>
  </div>`;
}

async function markDone(row, btn) {
  if (!isAdmin()) return;
  btn.textContent = '…'; btn.disabled = true;
  try {
    await fetch(apiUrl + `?action=markDone&row=${row}`, {mode:'no-cors'});
    confetti({particleCount:50,spread:45,origin:{y:.75},colors:['#39d353','#fff']});
    const el = document.getElementById('pi-'+row);
    if (el) { el.style.opacity='0'; el.style.transition='.3s'; setTimeout(()=>el.remove(),300); }
    const pill = document.getElementById('total-pill');
    const n = parseInt(pill.textContent)||1;
    pill.textContent = (n-1) + ' pending';
  } catch(e) { load(); }
}

async function addProblem() {
  if (!isAdmin()) { alert("🔒 READ-ONLY"); return; }
  const title = document.getElementById('add-title').value.trim();
  if (!title) { alert("Problem name required."); return; }
  const lane  = document.getElementById('add-lane').value;
  const topic = document.getElementById('add-topic').value.trim();
  const url   = document.getElementById('add-url').value.trim();
  const u = `${apiUrl}?action=add&lane=${encodeURIComponent(lane)}&topic=${encodeURIComponent(topic)}&title=${encodeURIComponent(title)}&url=${encodeURIComponent(url)}`;
  try { await fetch(u, {mode:'no-cors'}); } catch(e) {}
  document.getElementById('add-title').value = '';
  document.getElementById('add-topic').value = '';
  document.getElementById('add-url').value   = '';
  setTimeout(load, 900);
}

load();
</script>
</body></html>
